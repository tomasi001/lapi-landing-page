<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA Shweshwe — Cloth Simulation</title>
<style>
  :root {
    --bg: #060608;
    --fg: #ffffff;
    --fg10: #ffffff15;
    --fg20: #ffffff25;
    --fg30: #ffffff40;
    --fg50: #ffffff50;
    --fg70: #ffffff80;
    --btn-bg: #ffffff08;
    --btn-border: #ffffff15;
    --panel-bg: #0a0c12ee;
    --accent: #00ffd5;
  }
  html.light {
    --bg: #f0ede8;
    --fg: #1a1a1e;
    --fg10: #1a1a1e12;
    --fg20: #1a1a1e20;
    --fg30: #1a1a1e35;
    --fg50: #1a1a1e55;
    --fg70: #1a1a1e80;
    --btn-bg: #1a1a1e08;
    --btn-border: #1a1a1e18;
    --panel-bg: #e8e5e0ee;
    --accent: #007a66;
  }
  * { margin: 0; padding: 0; }
  body { background: var(--bg); overflow: hidden; cursor: crosshair; transition: background 0s; }
  canvas { display: block; }
  #info {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.65rem;
    color: var(--fg20);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
  }
  #palette-name {
    position: fixed;
    top: 1.5rem;
    right: 6rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.7rem;
    color: var(--fg30);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.5s;
  }
  .ctrl-btn {
    position: fixed;
    top: 1.5rem;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.65rem;
    color: var(--fg50);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    padding: 0.5rem 1rem;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s;
  }
  .ctrl-btn:hover { background: var(--fg10); color: var(--fg70); }
  .ctrl-btn.active { color: var(--accent); border-color: var(--accent); opacity: 0.7; }
  #music-btn { left: 2rem; }
  #mic-btn { left: 10rem; }
  #dev-btn { left: 17rem; }

  /* THEME TOGGLE */
  #theme-btn {
    position: fixed;
    top: 1.5rem;
    right: 2rem;
    width: 36px; height: 36px;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    border-radius: 50%;
    cursor: pointer;
    z-index: 15;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.3s, border-color 0.3s;
  }
  #theme-btn:hover { background: var(--fg10); }
  #theme-btn svg { width: 18px; height: 18px; }

  /* CLOTH WIPE OVERLAY */
  #cloth-wipe {
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
  }

  /* DEV PANEL */
  #dev-panel {
    position: fixed;
    top: 0; right: 0;
    width: 380px;
    height: 100vh;
    background: var(--panel-bg);
    border-left: 1px solid var(--fg10);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.78rem;
    color: var(--fg70);
    padding: 1rem 1.2rem 6rem;
    box-sizing: border-box;
    scrollbar-width: thin;
    scrollbar-color: #ffffff15 transparent;
    -webkit-overflow-scrolling: touch;
  }
  #dev-panel.open { transform: translateX(0); }
  #dev-panel h3 {
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: 0.5;
    margin: 1.2rem 0 0.5rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--fg10);
  }
  #dev-panel h3:first-child { margin-top: 0.3rem; }
  .p-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin: 0.3rem 0;
    height: 1.4rem;
  }
  .p-row label {
    flex: 0 0 110px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--fg50);
    font-size: 0.75rem;
  }
  .p-row input[type=range] {
    flex: 1;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--fg10);
    border-radius: 2px;
    outline: none;
  }
  .p-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .p-row .p-val {
    flex: 0 0 48px;
    width: 48px;
    text-align: right;
    color: var(--fg70);
    font-size: 0.72rem;
    background: var(--btn-bg);
    border: 1px solid var(--fg10);
    border-radius: 3px;
    padding: 1px 4px;
    font-family: inherit;
    outline: none;
    -moz-appearance: textfield;
  }
  .p-row .p-val:focus { border-color: var(--accent); opacity: 0.7; color: var(--fg70); }
  .p-row .p-val::-webkit-inner-spin-button,
  .p-row .p-val::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .p-revert {
    flex: 0 0 14px;
    width: 14px; height: 14px;
    background: none;
    border: 1px solid var(--fg10);
    border-radius: 3px;
    color: var(--fg20);
    font-size: 0.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all 0.2s;
    line-height: 1;
  }
  .p-revert:hover { border-color: #ff6b4a40; color: #ff6b4a90; }
  .p-revert.changed { border-color: #ff6b4a30; color: #ff6b4a60; }
  .snap-btn {
    display: block;
    width: 100%;
    margin-top: 0.5rem;
    padding: 0.6rem;
    background: var(--btn-bg);
    border: 1px solid var(--btn-border);
    color: var(--fg50);
    font-family: inherit;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }
  .snap-btn:hover { background: var(--fg10); color: var(--fg70); }
  .snap-btn.primary { background: color-mix(in srgb, var(--accent) 8%, transparent); border-color: var(--accent); opacity: 0.6; color: var(--accent); }
  .snap-btn.primary:hover { opacity: 0.9; }
  .snap-btn.danger { border-color: #ff6b4a20; color: #ff6b4a60; }
  .snap-btn.danger:hover { background: #ff6b4a15; color: #ff6b4a90; }
  #snapshot-list {
    margin-top: 0.8rem;
  }
  .snap-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--fg10);
    font-size: 0.68rem;
  }
  .snap-item .snap-name {
    flex: 1;
    color: var(--fg50);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .snap-item .snap-time {
    color: var(--fg20);
    font-size: 0.62rem;
    flex: 0 0 auto;
  }
  .snap-item button {
    flex: 0 0 auto;
    background: none;
    border: 1px solid var(--fg10);
    border-radius: 3px;
    color: var(--fg30);
    font-family: inherit;
    font-size: 0.62rem;
    padding: 2px 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .snap-item button:hover { border-color: var(--accent); color: var(--accent); opacity: 0.7; }
  .snap-item button.snap-del:hover { border-color: #ff6b4a40; color: #ff6b4a80; opacity: 1; }
  #copy-json {
    display: block;
    width: 100%;
    margin-top: 1rem;
    padding: 0.6rem;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    border: 1px solid var(--accent);
    color: var(--accent);
    opacity: 0.6;
    font-family: inherit;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }
  #copy-json:hover { opacity: 0.9; }
  #copy-json.copied { color: var(--fg); opacity: 1; }
  .p-tip {
    font-size: 0.62rem;
    color: var(--fg20);
    margin: -0.1rem 0 0.3rem 0;
    padding-left: 2px;
    line-height: 1.3;
  }
  .band-meter {
    flex: 0 0 30px;
    height: 3px;
    background: var(--fg10);
    border-radius: 2px;
    overflow: hidden;
  }
  .band-meter-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.05s;
    border-radius: 2px;
  }
</style>
</head>
<body>
<div id="info">click: ripple + palette &middot; drag: pull cloth &middot; music auto-plays</div>
<div id="palette-name"></div>
<button class="ctrl-btn" id="music-btn">&#9654; music</button>
<button class="ctrl-btn" id="mic-btn">mic off</button>
<button class="ctrl-btn" id="dev-btn">dev</button>
<button id="theme-btn" title="Toggle light/dark mode">
  <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--fg50)">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
  <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--fg50);display:none">
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </svg>
</button>
<svg id="cloth-wipe" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
<div id="dev-panel"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════
// TUNABLE PARAMS — all exposed via dev panel
// ═══════════════════════════════════════════════
const P = {
  // Physics
  substeps: 10,
  iterations: 3,
  gravity: -0.05,
  damping: 1,
  stretchCompliance: 0,
  bendCompliance: 0.0016,
  airDensity: 0,
  dragCoeff: 0.015,
  gravityDtMult: 0.02,

  // Wind
  windMultBase: 0.5,
  windMultBass: 4.7,
  windMultSubBass: 2,
  displaceSubBass: 0.44,
  breathingMult: 32,
  swayMult: 0,

  // Ripple
  rippleSpeed: 5,
  rippleFreq: 1,
  rippleDecay: 2.4,
  rippleSpatialDecay: 3.5,
  rippleAmplitude: 0.22,
  rippleImpulse: 27.5,

  // Drag
  grabRadius: 10,
  maxDragDisplacement: 0.06,
  dragLerp: 0.3,
  maxThrowSpeed: 23,
  throwMultiplier: 26,

  // Rest Return
  restReturnMinK: 0,
  restReturnMaxK: 0.15,
  restReturnRamp: 0.145,
  velClampSpeed: 1,
  centringK: 0.007,

  // Camera
  camRadius: 5.9,
  camSpeed: 0.16,
  camAudioPush: 0.65,
  camVertAmp: 0.3,
  camVertOffset: 0.9,

  // Audio
  audioSmoothing: 0.75,
  musicVolume: 0.6,

  // Trail
  trailFadeRate: 0.05,
  trailDrift: 0,

  // Lighting
  light1X: 0.6,
  light1Y: 0.8,
  light1Z: 0.5,
  light2X: -0.5,
  light2Y: 0.3,
  light2Z: -0.8,
  light1R: 1.0,
  light1G: 0.95,
  light1B: 0.9,
  light2R: 0.3,
  light2G: 0.35,
  light2B: 0.5,
};

// ═══════════════════════════════════════════════
// DEV PANEL — slider definitions
// ═══════════════════════════════════════════════
const PARAM_DEFS = {
  'Physics': [
    { key: 'substeps',          min: 1,    max: 20,    step: 1,      tip: 'How many mini-steps per frame. Higher = more accurate but slower. Makes the cloth feel tighter and more stable.' },
    { key: 'iterations',        min: 1,    max: 10,    step: 1,      tip: 'How many times constraints are solved per step. More = stiffer, less stretchy cloth.' },
    { key: 'gravity',           min: -3,   max: 0,     step: 0.05,   tip: 'How hard gravity pulls the cloth down. More negative = heavier cloth. 0 = floats in space.' },
    { key: 'damping',           min: 0.95, max: 1,     step: 0.001,  tip: 'How quickly movement dies out. 1 = never stops, 0.95 = very sluggish. Think of it as air resistance on every particle.' },
    { key: 'stretchCompliance', min: 0,    max: 0.01,  step: 0.0001, tip: 'How stretchy the cloth is. 0 = totally rigid edges, higher = rubber-band-like. Even tiny values make a big difference.' },
    { key: 'bendCompliance',    min: 0,    max: 0.01,  step: 0.0001, tip: 'How easy it is to fold the cloth. 0 = stiff like cardboard, higher = soft like silk.' },
    { key: 'airDensity',        min: 0,    max: 5,     step: 0.1,    tip: 'How thick the air feels. Higher = cloth billows and catches wind more dramatically.' },
    { key: 'dragCoeff',         min: 0,    max: 0.2,   step: 0.005,  tip: 'How much the air slows the cloth down. Higher = parachute effect, lower = cuts through air like a knife.' },
    { key: 'gravityDtMult',     min: 0,    max: 0.1,   step: 0.002,  tip: 'Scales how strongly gravity is applied each step. Lower = gentle floating, higher = heavy pull.' },
  ],
  'Wind / Audio Force': [
    { key: 'windMultBase',    min: 0,  max: 5,   step: 0.1,  tip: 'Base wind strength when no music is playing. 0 = dead calm, higher = constant breeze.' },
    { key: 'windMultBass',    min: 0,  max: 10,  step: 0.1,  tip: 'How much bass frequencies boost the wind. Crank it up and the cloth surges with every kick drum.' },
    { key: 'windMultSubBass', min: 0,  max: 5,   step: 0.1,  tip: 'How much deep sub-bass rumble adds to wind. Those really low frequencies you feel more than hear.' },
    { key: 'displaceSubBass', min: 0,  max: 1,   step: 0.01, tip: 'How much sub-bass pushes the cloth in and out, like breathing. Higher = the cloth pulses with deep bass.' },
    { key: 'breathingMult',   min: 0,  max: 100, step: 1,    tip: 'Strength of the breathing/pulsing animation driven by sub-bass. Makes the cloth feel alive.' },
    { key: 'swayMult',        min: 0,  max: 40,  step: 0.5,  tip: 'How much the mid frequencies make the cloth sway side to side. Like the cloth is dancing.' },
  ],
  'Ripple': [
    { key: 'rippleSpeed',        min: 0.5, max: 10,  step: 0.1,  tip: 'How fast the ripple wave travels outward from where you clicked. Higher = instant splash, lower = slow pond ripple.' },
    { key: 'rippleFreq',         min: 1,   max: 20,  step: 0.5,  tip: 'How many wave peaks in the ripple. Higher = tight, detailed waves. Lower = big, smooth rolls.' },
    { key: 'rippleDecay',        min: 0.5, max: 10,  step: 0.1,  tip: 'How quickly the ripple fades over time. Higher = quick splash, lower = ripple lingers for ages.' },
    { key: 'rippleSpatialDecay', min: 0.1, max: 5,   step: 0.1,  tip: 'How quickly the ripple fades with distance from the click point. Higher = small local splash, lower = reaches the edges.' },
    { key: 'rippleAmplitude',    min: 0,   max: 0.5, step: 0.01, tip: 'How tall the ripple waves are. Higher = dramatic splash, lower = subtle shimmer.' },
    { key: 'rippleImpulse',      min: 1,   max: 30,  step: 0.5,  tip: 'The force behind each ripple wave. Multiplies the wave into actual cloth movement.' },
  ],
  'Drag': [
    { key: 'grabRadius',          min: 1,  max: 20,  step: 1,     tip: 'How many nearby particles move when you drag. Higher = grabs a bigger chunk of cloth, like a fist. Lower = pinches a tiny spot.' },
    { key: 'maxDragDisplacement', min: 0.005, max: 0.2, step: 0.005, tip: 'Max distance the cloth can move per frame while dragging. Lower = smoother, prevents folding through itself. Higher = more responsive but riskier.' },
    { key: 'dragLerp',            min: 0.05, max: 1,  step: 0.05, tip: 'How quickly the cloth follows your mouse while dragging. 1 = instant snap, 0.05 = lazy, silky smooth trailing.' },
    { key: 'maxThrowSpeed',       min: 1,  max: 50,  step: 1,     tip: 'Speed limit when you release the cloth after dragging. Prevents it from flying off into infinity.' },
    { key: 'throwMultiplier',     min: 1,  max: 50,  step: 1,     tip: 'How much momentum transfers when you let go. Higher = cloth keeps moving fast in the direction you threw it.' },
  ],
  'Rest Return': [
    { key: 'restReturnMinK',  min: 0,   max: 0.5, step: 0.005, tip: 'Starting spring strength pulling cloth back to flat after you let go. Low = gentle, gradual return.' },
    { key: 'restReturnMaxK',  min: 0,   max: 1,   step: 0.01,  tip: 'Maximum spring strength over time. How aggressively it snaps back to flat. Higher = forceful reset.' },
    { key: 'restReturnRamp',  min: 0,   max: 0.5, step: 0.005, tip: 'How fast the spring ramps from min to max. Higher = quickly forces the cloth flat. Lower = lets it settle naturally.' },
    { key: 'velClampSpeed',   min: 1,   max: 30,  step: 0.5,   tip: 'Global speed limit for all particles. Prevents anything from moving too fast. Safety net against explosions.' },
    { key: 'centringK',       min: 0,   max: 0.02, step: 0.001, tip: 'Gentle force keeping the whole cloth centred on screen. Without it, the cloth can drift off into the void.' },
  ],
  'Camera': [
    { key: 'camRadius',     min: 2,   max: 15,  step: 0.1,  tip: 'How far the camera orbits from the cloth. Smaller = zoomed in close, bigger = pulled way back.' },
    { key: 'camSpeed',      min: 0,   max: 0.5, step: 0.01, tip: 'How fast the camera orbits around the cloth. 0 = frozen in place, higher = spinning around it.' },
    { key: 'camAudioPush',  min: 0,   max: 2,   step: 0.05, tip: 'How much bass pushes the camera closer/further. Creates a zoom-pulse effect synced to the beat.' },
    { key: 'camVertAmp',    min: 0,   max: 3,   step: 0.1,  tip: 'How much the camera bobs up and down as it orbits. 0 = flat circle, higher = roller-coaster.' },
    { key: 'camVertOffset', min: -2,  max: 2,   step: 0.1,  tip: 'Shifts the camera up or down. Positive = looking down at the cloth, negative = looking up at it.' },
  ],
  'Audio': [
    { key: 'audioSmoothing', min: 0, max: 1,   step: 0.05, tip: 'How much the audio analysis smooths out over time. 0 = raw and jittery, 1 = very sluggish and averaged.' },
    { key: 'musicVolume',    min: 0, max: 1,   step: 0.05, tip: 'Volume of the background music track. Doesn\'t affect how strongly the cloth reacts — just what you hear.' },
  ],
  'Trail': [
    { key: 'trailFadeRate', min: 0.05, max: 2,   step: 0.05, tip: 'How fast sparkle particles fade out. Higher = quick flash, lower = long glowing trails behind your drag.' },
    { key: 'trailDrift',    min: 0,    max: 0.1, step: 0.005, tip: 'How fast sparkle particles float upward. 0 = stay in place, higher = they rise like embers.' },
  ],
  'Lighting': [
    { key: 'light1X', min: -1, max: 1, step: 0.05, tip: 'Main light direction — left/right. Moves the primary light source horizontally.' },
    { key: 'light1Y', min: -1, max: 1, step: 0.05, tip: 'Main light direction — up/down. Higher = light from above, lower = light from below.' },
    { key: 'light1Z', min: -1, max: 1, step: 0.05, tip: 'Main light direction — front/back. Positive = light from in front, negative = from behind.' },
    { key: 'light2X', min: -1, max: 1, step: 0.05, tip: 'Fill light direction — left/right. The secondary, cooler-toned light.' },
    { key: 'light2Y', min: -1, max: 1, step: 0.05, tip: 'Fill light direction — up/down.' },
    { key: 'light2Z', min: -1, max: 1, step: 0.05, tip: 'Fill light direction — front/back.' },
    { key: 'light1R', min: 0, max: 2, step: 0.05, tip: 'Main light red channel. Adjust to warm up or cool down the primary light colour.' },
    { key: 'light1G', min: 0, max: 2, step: 0.05, tip: 'Main light green channel.' },
    { key: 'light1B', min: 0, max: 2, step: 0.05, tip: 'Main light blue channel.' },
    { key: 'light2R', min: 0, max: 2, step: 0.05, tip: 'Fill light red channel. The fill light is usually cooler/bluer.' },
    { key: 'light2G', min: 0, max: 2, step: 0.05, tip: 'Fill light green channel.' },
    { key: 'light2B', min: 0, max: 2, step: 0.05, tip: 'Fill light blue channel.' },
  ],
};

// Build dev panel UI
const devPanel = document.getElementById('dev-panel');
const devBtn = document.getElementById('dev-btn');
const sliderEls = {};
const valEls = {};
const revertEls = {};
const bandMeterEls = {};

// Store defaults for revert
const DEFAULTS = JSON.parse(JSON.stringify(P));

// Snapshot storage key
const SNAP_KEY = 'shweshwe-cloth-snapshots';

function getDecimals(step) {
  return step < 0.001 ? 4 : step < 0.01 ? 3 : step < 1 ? 2 : 0;
}

function applyValue(key, v) {
  P[key] = v;
  if (key === 'musicVolume' && musicAudio) musicAudio.volume = v;
  if (key === 'audioSmoothing' && analyser) analyser.smoothingTimeConstant = v;
  // Mark revert button if changed from default
  const rb = revertEls[key];
  if (rb) rb.classList.toggle('changed', v !== DEFAULTS[key]);
}

function syncUI(key, v) {
  // Find the param def to get step for decimals
  let step = 0.01;
  for (const params of Object.values(PARAM_DEFS)) {
    const found = params.find(p => p.key === key);
    if (found) { step = found.step; break; }
  }
  const decimals = getDecimals(step);
  if (sliderEls[key]) sliderEls[key].value = v;
  if (valEls[key]) valEls[key].value = v.toFixed(decimals);
  const rb = revertEls[key];
  if (rb) rb.classList.toggle('changed', v !== DEFAULTS[key]);
}

function buildDevPanel() {
  let html = '';
  for (const [section, params] of Object.entries(PARAM_DEFS)) {
    html += `<h3>${section}</h3>`;
    for (const { key, min, max, step, tip } of params) {
      const val = P[key];
      const decimals = getDecimals(step);
      const changed = val !== DEFAULTS[key];
      html += `<div class="p-row">

        <input type="number" class="p-val" id="vl_${key}" value="${val.toFixed(decimals)}" step="${step}" min="${min}" max="${max}">
        <button class="p-revert${changed ? ' changed' : ''}" id="rv_${key}" title="Revert to default (${DEFAULTS[key]})">&#8634;</button>
      </div>`;
      if (tip) html += `<div class="p-tip">${tip}</div>`;
    }
  }

  // Audio band meters
  html += '<h3>Audio Bands (live)</h3>';
  const bands = ['subBass', 'bass', 'lowMid', 'mid', 'highMid', 'high'];
  for (const b of bands) {
    html += `<div class="p-row">
      <label>${b}</label>
      <div class="band-meter"><div class="band-meter-fill" id="bm_${b}" style="width:0%"></div></div>
      <input type="number" class="p-val" id="bv_${b}" value="0.00" readonly tabindex="-1" style="opacity:0.5;pointer-events:none;">
    </div>`;
  }

  // Action buttons
  html += '<h3>Snapshots</h3>';
  html += '<button class="snap-btn primary" id="randomise">Randomise</button>';
  html += '<button class="snap-btn danger" id="reset-cloth">Reset Cloth</button>';
  html += '<button class="snap-btn primary" id="save-snapshot">Save Snapshot</button>';
  html += '<button class="snap-btn" id="revert-all">Revert All to Defaults</button>';
  html += '<button class="snap-btn primary" id="copy-json">Copy JSON</button>';
  html += '<div id="snapshot-list"></div>';

  devPanel.innerHTML = html;

  // Cache elements and wire events
  for (const [, params] of Object.entries(PARAM_DEFS)) {
    for (const { key, step } of params) {
      const sl = document.getElementById(`sl_${key}`);
      const vl = document.getElementById(`vl_${key}`);
      const rv = document.getElementById(`rv_${key}`);
      sliderEls[key] = sl;
      valEls[key] = vl;
      revertEls[key] = rv;
      const decimals = getDecimals(step);

      // Slider → value
      sl.addEventListener('input', () => {
        const v = parseFloat(sl.value);
        vl.value = v.toFixed(decimals);
        applyValue(key, v);
      });

      // Number input → slider + value
      vl.addEventListener('input', () => {
        const v = parseFloat(vl.value);
        if (isNaN(v)) return;
        sl.value = v;
        applyValue(key, v);
      });
      // On blur, clamp and format
      vl.addEventListener('blur', () => {
        let v = parseFloat(vl.value);
        if (isNaN(v)) v = DEFAULTS[key];
        vl.value = v.toFixed(decimals);
        sl.value = v;
        applyValue(key, v);
      });
      // Enter key confirms
      vl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { vl.blur(); e.preventDefault(); }
      });

      // Revert button
      rv.addEventListener('click', () => {
        const def = DEFAULTS[key];
        P[key] = def;
        sl.value = def;
        vl.value = def.toFixed(decimals);
        rv.classList.remove('changed');
        applyValue(key, def);
      });
    }
  }

  for (const b of bands) {
    bandMeterEls[b] = document.getElementById(`bm_${b}`);
  }

  // Copy JSON
  document.getElementById('copy-json').addEventListener('click', function() {
    const json = JSON.stringify(P, null, 2);
    navigator.clipboard.writeText(json).then(() => {
      const orig = this.textContent;
      this.textContent = 'Copied!';
      this.style.color = '#ffffff';
      setTimeout(() => { this.textContent = orig; this.style.color = ''; }, 1500);
    });
  });

  // Revert all
  document.getElementById('revert-all').addEventListener('click', () => {
    for (const key in DEFAULTS) {
      P[key] = DEFAULTS[key];
      syncUI(key, DEFAULTS[key]);
      applyValue(key, DEFAULTS[key]);
    }
  });

  // Reset cloth — teleport all particles back to rest, zero velocities
  document.getElementById('reset-cloth').addEventListener('click', () => {
    resetClothState();
  });

  // Randomise — biased toward sensible values using gaussian-ish distribution
  document.getElementById('randomise').addEventListener('click', () => {
    // Helper: random between min/max, biased toward the default (bell curve around it)
    function biasedRandom(min, max, def, step) {
      // 70% of the time: gaussian around default within ±50% of range
      // 30% of the time: uniform across full range (for exploration)
      const range = max - min;
      let v;
      if (Math.random() < 0.7) {
        // Box-Muller gaussian, sigma = 25% of range
        const u1 = Math.random(), u2 = Math.random();
        const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
        v = def + z * range * 0.25;
      } else {
        v = min + Math.random() * range;
      }
      // Clamp to range
      v = Math.max(min, Math.min(max, v));
      // Snap to step
      if (step > 0) v = Math.round(v / step) * step;
      return v;
    }

    for (const [, params] of Object.entries(PARAM_DEFS)) {
      for (const { key, min, max, step } of params) {
        const v = biasedRandom(min, max, DEFAULTS[key], step);
        P[key] = v;
        syncUI(key, v);
        applyValue(key, v);
      }
    }
  });

  // Save snapshot
  document.getElementById('save-snapshot').addEventListener('click', () => {
    const name = prompt('Snapshot name:', `Snapshot ${new Date().toLocaleString('en-ZA')}`);
    if (!name) return;
    const snapshots = JSON.parse(localStorage.getItem(SNAP_KEY) || '[]');
    snapshots.unshift({
      name,
      time: Date.now(),
      params: JSON.parse(JSON.stringify(P)),
    });
    // Keep max 50 snapshots
    if (snapshots.length > 50) snapshots.length = 50;
    localStorage.setItem(SNAP_KEY, JSON.stringify(snapshots));
    renderSnapshots();
  });

  renderSnapshots();
}

function renderSnapshots() {
  const container = document.getElementById('snapshot-list');
  if (!container) return;
  const snapshots = JSON.parse(localStorage.getItem(SNAP_KEY) || '[]');
  if (snapshots.length === 0) {
    container.innerHTML = '<div style="color:#ffffff20;font-size:0.62rem;padding:0.5rem 0;">No snapshots saved yet</div>';
    return;
  }
  let html = '';
  for (let i = 0; i < snapshots.length; i++) {
    const s = snapshots[i];
    const date = new Date(s.time);
    const timeStr = date.toLocaleString('en-ZA', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    html += `<div class="snap-item">
      <span class="snap-name" title="${s.name}">${s.name}</span>
      <span class="snap-time">${timeStr}</span>
      <button data-snap-load="${i}">Load</button>
      <button data-snap-copy="${i}">JSON</button>
      <button class="snap-del" data-snap-del="${i}">&#10005;</button>
    </div>`;
  }
  container.innerHTML = html;

  // Wire snapshot buttons
  container.querySelectorAll('[data-snap-load]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.snapLoad);
      const snap = snapshots[idx];
      if (!snap) return;
      for (const key in snap.params) {
        if (key in P) {
          P[key] = snap.params[key];
          syncUI(key, snap.params[key]);
          applyValue(key, snap.params[key]);
        }
      }
    });
  });

  container.querySelectorAll('[data-snap-copy]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.snapCopy);
      const snap = snapshots[idx];
      if (!snap) return;
      navigator.clipboard.writeText(JSON.stringify(snap.params, null, 2)).then(() => {
        btn.textContent = 'OK';
        setTimeout(() => { btn.textContent = 'JSON'; }, 1000);
      });
    });
  });

  container.querySelectorAll('[data-snap-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.snapDel);
      snapshots.splice(idx, 1);
      localStorage.setItem(SNAP_KEY, JSON.stringify(snapshots));
      renderSnapshots();
    });
  });
}

// THEME TOGGLE — cloth wipe SVG animation
// ═══════════════════════════════════════════════
let isDark = true;
let wipeAnimating = false;

const themeBtn = document.getElementById('theme-btn');

const iconLight = document.getElementById('theme-icon-light');

// Generate a wavy cloth-edge path with undulating folds
function clothEdgePath(xPercent, amplitude, segments, seed) {
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const y = t * 100;
    // Multi-frequency wave for natural cloth drape
    const wave = Math.sin(t * Math.PI * 3 + seed) * amplitude
               + Math.sin(t * Math.PI * 7 + seed * 2.3) * amplitude * 0.4
               + Math.sin(t * Math.PI * 13 + seed * 0.7) * amplitude * 0.15;
    points.push({ x: xPercent + wave, y });
  }
  // Build SVG path
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1];
    const cur = points[i];
    const cpY = (prev.y + cur.y) / 2;
    d += ` C ${prev.x} ${cpY}, ${cur.x} ${cpY}, ${cur.x} ${cur.y}`;
  }
  return d;
}

function runClothWipe(toLight) {
  if (wipeAnimating) return;
  wipeAnimating = true;

  const targetColour = toLight ? '#f0ede8' : '#060608';
  const seed = Math.random() * 10;
  const duration = 900;
  const fps = 60;
  const totalFrames = Math.ceil(duration / (1000 / fps));
  const segments = 40;
  const amplitude = 8;

  // Create the wipe rectangle + wavy clip path
  const ns = 'http://www.w3.org/2000/svg';
  clothWipeSvg.innerHTML = '';

  const defs = document.createElementNS(ns, 'defs');
  const clipPath = document.createElementNS(ns, 'clipPath');
  clipPath.id = 'wipe-clip';
  const clipPathEl = document.createElementNS(ns, 'path');
  clipPath.appendChild(clipPathEl);
  defs.appendChild(clipPath);
  clothWipeSvg.appendChild(defs);

  const rect = document.createElementNS(ns, 'rect');
  rect.setAttribute('width', '100');
  rect.setAttribute('height', '100');
  rect.setAttribute('fill', targetColour);
  rect.setAttribute('clip-path', 'url(#wipe-clip)');
  clothWipeSvg.appendChild(rect);

  // Cloth-fold shadow line for depth
  const shadowPath = document.createElementNS(ns, 'path');
  shadowPath.setAttribute('fill', 'none');
  shadowPath.setAttribute('stroke', toLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.04)');
  shadowPath.setAttribute('stroke-width', '0.8');
  clothWipeSvg.appendChild(shadowPath);

  let frame = 0;
  const direction = toLight ? 1 : -1; // L→R for light, R→L for dark

  function animate() {
    frame++;
    const progress = frame / totalFrames;
    // Ease: cubic in-out
    const ease = progress < 0.5
      ? 4 * progress * progress * progress
      : 1 - Math.pow(-2 * progress + 2, 3) / 2;

    let edgeX;
    if (direction === 1) {
      // Left to right
      edgeX = -15 + ease * 130; // overshoot past 100
    } else {
      // Right to left
      edgeX = 115 - ease * 130;
    }

    // Animate the wave seed for rippling cloth motion
    const animSeed = seed + progress * 4;
    const edgePath = clothEdgePath(edgeX, amplitude * (1 - Math.abs(ease - 0.5) * 1.2), segments, animSeed);

    // Build clip region: everything on the "filled" side of the wavy edge
    let clipD;
    if (direction === 1) {
      clipD = `M -5 0 L -5 100 ${edgePath} L -5 0 Z`;
    } else {
      clipD = `M 105 0 L 105 100 ${edgePath} L 105 0 Z`;
    }
    clipPathEl.setAttribute('d', clipD);
    shadowPath.setAttribute('d', edgePath);

    if (frame < totalFrames) {
      requestAnimationFrame(animate);
    } else {
      // Apply the actual theme
      if (toLight) {
        document.documentElement.classList.add('light');
      } else {
        document.documentElement.classList.remove('light');
      }
      isDark = !toLight;

      // Update Three.js scene
      updateSceneTheme();

      // Swap icons
      iconDark.style.display = toLight ? 'none' : 'block';
      iconLight.style.display = toLight ? 'block' : 'none';

      // Fade out wipe overlay
      clothWipeSvg.style.transition = 'opacity 0.3s';
      clothWipeSvg.style.opacity = '0';
      setTimeout(() => {
        clothWipeSvg.innerHTML = '';
        clothWipeSvg.style.transition = '';
        clothWipeSvg.style.opacity = '1';
        wipeAnimating = false;
      }, 300);
    }
  }
  requestAnimationFrame(animate);
}

// ═══════════════════════════════════════════════
// ONE-EURO FILTER
// ═══════════════════════════════════════════════
class OneEuroFilter {
  constructor(fcMin = 1.0, beta = 0.007, dCutoff = 1.0) {
    this.fcMin = fcMin; this.beta = beta; this.dCutoff = dCutoff;
    this.xPrev = null; this.dxPrev = 0;
  }
  _alpha(dt, fc) { const tau = 1/(2*Math.PI*fc); return 1/(1+tau/dt); }
  filter(x, dt) {
    if (this.xPrev === null) { this.xPrev = x; return x; }
    const dx = (x - this.xPrev) / dt;
    const adx = this._alpha(dt, this.dCutoff);
    const dxS = adx * dx + (1-adx) * this.dxPrev;
    const fc = this.fcMin + this.beta * Math.abs(dxS);
    const a = this._alpha(dt, fc);
    const result = a * x + (1-a) * this.xPrev;
    this.xPrev = result; this.dxPrev = dxS;
    return result;
  }
}

// ═══════════════════════════════════════════════
// AUDIO — music track + mic, shared analyser
// ═══════════════════════════════════════════════
let audioCtx = null;
let analyser = null;
let freqData = null;
let audioActive = false;

// Sources
let musicAudio = null;
let musicSource = null;
let micStream = null;
let micSource = null;
let musicPlaying = false;
let micActive = false;

const audioBands = { subBass:0, bass:0, lowMid:0, mid:0, highMid:0, high:0 };
const bandFilters = {
  subBass: new OneEuroFilter(0.8, 0.05),
  bass:    new OneEuroFilter(1.0, 0.08),
  lowMid:  new OneEuroFilter(1.2, 0.04),
  mid:     new OneEuroFilter(0.8, 0.03),
  highMid: new OneEuroFilter(1.5, 0.1),
  high:    new OneEuroFilter(1.0, 0.06),
};

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = P.audioSmoothing;
    freqData = new Uint8Array(analyser.frequencyBinCount);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function getBandEnergy(data, startHz, endHz) {
  const sr = audioCtx.sampleRate;
  const binW = sr / analyser.fftSize;
  const s = Math.max(1, Math.floor(startHz / binW));
  const e = Math.min(Math.floor(endHz / binW), data.length - 1);
  let sum = 0;
  for (let i = s; i <= e; i++) sum += data[i];
  return sum / (e - s + 1) / 255;
}

function updateAudio(dt) {
  if (!audioActive || !analyser) return;
  analyser.getByteFrequencyData(freqData);

  const raw = {
    subBass: Math.pow(getBandEnergy(freqData, 20, 60), 1.5),
    bass:    Math.pow(getBandEnergy(freqData, 60, 250), 1.4),
    lowMid:  Math.pow(getBandEnergy(freqData, 250, 500), 1.3),
    mid:     Math.pow(getBandEnergy(freqData, 500, 2000), 1.3),
    highMid: Math.pow(getBandEnergy(freqData, 2000, 6000), 1.2),
    high:    Math.pow(getBandEnergy(freqData, 6000, 20000), 1.2),
  };
  for (const band in raw) {
    audioBands[band] = bandFilters[band].filter(raw[band], dt);
  }
}

// Music
async function toggleMusic() {
  ensureAudioCtx();
  if (musicPlaying) {
    musicAudio.pause();
    musicPlaying = false;
    if (!micActive) audioActive = false;
    document.getElementById('music-btn').classList.remove('active');
    document.getElementById('music-btn').innerHTML = '&#9654; music';
    return;
  }

  // If song ended, reset to start
  if (musicAudio && musicAudio.ended) {
    musicAudio.currentTime = 0;
  }

  if (!musicAudio) {
    musicAudio = new Audio('https://assets.mixkit.co/music/127/127.mp3');
    musicAudio.crossOrigin = 'anonymous';
    musicAudio.loop = true;
    musicAudio.volume = P.musicVolume;
    musicSource = audioCtx.createMediaElementSource(musicAudio);
    musicSource.connect(analyser);
    analyser.connect(audioCtx.destination);

    // Fallback loop — some browsers ignore .loop with MediaElementSource
    musicAudio.addEventListener('ended', () => {
      musicAudio.currentTime = 0;
      musicAudio.play().catch(() => {});
    });
  }

  try {
    await musicAudio.play();
    musicPlaying = true;
    audioActive = true;
    document.getElementById('music-btn').classList.add('active');
    document.getElementById('music-btn').innerHTML = '&#9646;&#9646; music';
  } catch(e) { console.warn('Music playback failed:', e); }
}

// Mic
async function toggleMic() {
  ensureAudioCtx();
  if (micActive) {
    // Stop mic
    if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
    if (micSource) { micSource.disconnect(); micSource = null; }
    micActive = false;
    if (!musicPlaying) audioActive = false;
    // Reconnect music to analyser if playing
    if (musicPlaying && musicSource) {
      musicSource.connect(analyser);
      analyser.connect(audioCtx.destination);
    }
    document.getElementById('mic-btn').classList.remove('active');
    document.getElementById('mic-btn').textContent = 'mic off';
    return;
  }

  try {
    // Pause music when mic is on
    if (musicPlaying) {
      musicAudio.pause();
      musicPlaying = false;
      document.getElementById('music-btn').classList.remove('active');
      document.getElementById('music-btn').innerHTML = '&#9654; music';
    }
    // Disconnect music source from analyser
    if (musicSource) { try { musicSource.disconnect(); } catch(e){} }
    try { analyser.disconnect(); } catch(e){}

    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micSource = audioCtx.createMediaStreamSource(micStream);
    micSource.connect(analyser);
    // Do NOT connect analyser to destination (feedback)
    micActive = true;
    audioActive = true;
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-btn').textContent = 'mic on';
  } catch(e) { console.warn('Mic denied:', e); }
}

// XPBD CLOTH SOLVER
// ═══════════════════════════════════════════════
const numParticles = COLS * ROWS;
const pos = new Float32Array(numParticles * 3);
const restPos = new Float32Array(numParticles * 3);
const prevPos = new Float32Array(numParticles * 3);
const vel = new Float32Array(numParticles * 3);
const invMass = new Float32Array(numParticles);

const distConstraints = [];
const bendConstraints = [];

function idx(r, c) { return r * COLS + c; }

for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const i = idx(r, c);
    const x = (c - (COLS-1)/2) * SPACING;
    const y = (r - (ROWS-1)/2) * SPACING;
    const z = Math.sin(c*0.08 + r*0.06) * 0.06;
    pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=z;
    restPos[i*3]=x; restPos[i*3+1]=y; restPos[i*3+2]=z;
    prevPos[i*3]=x; prevPos[i*3+1]=y; prevPos[i*3+2]=z;
    invMass[i] = 1.0;
  }
}

function addDist(i0, i1) {
  const dx=pos[i0*3]-pos[i1*3], dy=pos[i0*3+1]-pos[i1*3+1], dz=pos[i0*3+2]-pos[i1*3+2];
  distConstraints.push({i0,i1,restLen:Math.sqrt(dx*dx+dy*dy+dz*dz)});
}
function addBend(i2, i3) {
  const dx=pos[i2*3]-pos[i3*3], dy=pos[i2*3+1]-pos[i3*3+1], dz=pos[i2*3+2]-pos[i3*3+2];
  bendConstraints.push({i0:i2,i1:i3,restLen:Math.sqrt(dx*dx+dy*dy+dz*dz)});
}

for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const i = idx(r, c);
    if (c<COLS-1) addDist(i, idx(r,c+1));
    if (r<ROWS-1) addDist(i, idx(r+1,c));
    if (c<COLS-1 && r<ROWS-1) { addDist(i, idx(r+1,c+1)); addDist(idx(r,c+1), idx(r+1,c)); }
    if (c<COLS-2) addBend(i, idx(r,c+2));
    if (r<ROWS-2) addBend(i, idx(r+2,c));
  }
}

function solveConstraint(c, compliance, dt) {
  const {i0,i1,restLen} = c;
  const w0=invMass[i0], w1=invMass[i1], wS=w0+w1;
  if (wS===0) return;
  const dx=pos[i1*3]-pos[i0*3], dy=pos[i1*3+1]-pos[i0*3+1], dz=pos[i1*3+2]-pos[i0*3+2];
  const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
  if (len<1e-8) return;
  const alpha=compliance/(dt*dt);
  const lambda=-(len-restLen)/(wS+alpha);
  const nx=dx/len, ny=dy/len, nz=dz/len;
  pos[i0*3]-=w0*lambda*nx; pos[i0*3+1]-=w0*lambda*ny; pos[i0*3+2]-=w0*lambda*nz;
  pos[i1*3]+=w1*lambda*nx; pos[i1*3+1]+=w1*lambda*ny; pos[i1*3+2]+=w1*lambda*nz;
}

// ═══════════════════════════════════════════════
// RIPPLE SYSTEM — damped radial waves
// ═══════════════════════════════════════════════
const ripples = []; // {cx, cy, startTime}

function addRipple(worldPos) {
  ripples.push({ cx: worldPos.x, cy: worldPos.y, startTime: time });
  if (ripples.length > 5) ripples.shift();
}

function applyRipples() {
  for (let ri = ripples.length - 1; ri >= 0; ri--) {
    const rip = ripples[ri];
    const elapsed = time - rip.startTime;
    if (elapsed > 3.0) { ripples.splice(ri, 1); continue; }

    const omega = 2 * Math.PI * P.rippleFreq;

    for (let i = 0; i < numParticles; i++) {
      if (invMass[i] === 0) continue;
      const px = restPos[i*3], py = restPos[i*3+1];
      const r = Math.sqrt((px-rip.cx)**2 + (py-rip.cy)**2);
      const arrival = r / P.rippleSpeed;
      const localT = elapsed - arrival;
      if (localT < 0) continue;

      const envelope = P.rippleAmplitude * Math.exp(-P.rippleDecay * localT) * Math.exp(-P.rippleSpatialDecay * r);
      const wave = envelope * Math.sin(omega * localT);

      vel[i*3+2] += wave * P.rippleImpulse / P.substeps;
    }
  }
}

// ═══════════════════════════════════════════════
// DRAG INTERACTION — lerp-smoothed, clamped
// ═══════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2();
let grabbed = -1;
let grabDepth = 0;
let isDragging = false;
let dragMoved = false;
let dragVelocity = new THREE.Vector3();
let prevDragPos = new THREE.Vector3();
let dragTarget = new THREE.Vector3();
let releaseTime = 0;

const MAX_TRAIL = 600;
const trailPositions = new Float32Array(MAX_TRAIL * 3);
const trailAlphas = new Float32Array(MAX_TRAIL);
const trailSizes = new Float32Array(MAX_TRAIL);
let trailHead = 0, trailCount = 0;

let grabInfluence = new Map();

function getMouseWorldPos(x, y, depth) {
  const ndc = new THREE.Vector3((x/window.innerWidth)*2-1, -(y/window.innerHeight)*2+1, 0.5);
  ndc.unproject(camera);
  const dir = ndc.sub(camera.position).normalize();
  return camera.position.clone().add(dir.multiplyScalar(depth));
}

function findNearestParticle(worldPos, maxDist) {
  let best = -1, bestD2 = maxDist*maxDist;
  for (let i = 0; i < numParticles; i++) {
    const dx=pos[i*3]-worldPos.x, dy=pos[i*3+1]-worldPos.y, dz=pos[i*3+2]-worldPos.z;
    const d2=dx*dx+dy*dy+dz*dz;
    if (d2<bestD2) { bestD2=d2; best=i; }
  }
  return best;
}

function grabNeighbours(centerIdx) {
  grabInfluence.clear();
  const cr = Math.floor(centerIdx / COLS), cc = centerIdx % COLS;
  const gr = Math.round(P.grabRadius);
  for (let dr = -gr; dr <= gr; dr++) {
    for (let dc = -gr; dc <= gr; dc++) {
      const r = cr+dr, c = cc+dc;
      if (r<0||r>=ROWS||c<0||c>=COLS) continue;
      const dist = Math.sqrt(dr*dr+dc*dc);
      if (dist > gr) continue;
      grabInfluence.set(idx(r,c), 0.5*(1+Math.cos(Math.PI*dist/gr)));
    }
  }
}

function onPointerDown(e) {
  if (e.target.closest('.ctrl-btn') || e.target.closest('#dev-panel')) return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouseNDC.set(((e.clientX-rect.left)/rect.width)*2-1, -((e.clientY-rect.top)/rect.height)*2+1);
  raycaster.setFromCamera(mouseNDC, camera);

  const intersects = raycaster.intersectObject(mesh);
  if (intersects.length > 0) {
    const hit = intersects[0];
    grabDepth = hit.distance;
    grabbed = findNearestParticle(hit.point, 0.3);
    if (grabbed >= 0) {
      isDragging = true;
      dragMoved = false;
      invMass[grabbed] = 0;
      prevDragPos.set(pos[grabbed*3], pos[grabbed*3+1], pos[grabbed*3+2]);
      dragTarget.copy(prevDragPos);
      grabNeighbours(grabbed);
    }
  }
}

function onPointerMove(e) {
  if (!isDragging || grabbed < 0) return;
  dragMoved = true;

  const worldPos = getMouseWorldPos(e.clientX, e.clientY, grabDepth);

  // Lerp target toward mouse (smooth, prevents snapping)
  dragTarget.lerp(worldPos, P.dragLerp);

  // Compute clamped displacement from current pos
  let dx = dragTarget.x - pos[grabbed*3];
  let dy = dragTarget.y - pos[grabbed*3+1];
  let dz = dragTarget.z - pos[grabbed*3+2];
  const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

  // Clamp max displacement per frame
  if (dist > P.maxDragDisplacement) {
    const scale = P.maxDragDisplacement / dist;
    dx *= scale; dy *= scale; dz *= scale;
  }

  // Apply with influence falloff
  for (const [pi, weight] of grabInfluence) {
    pos[pi*3]   += dx*weight; pos[pi*3+1] += dy*weight; pos[pi*3+2] += dz*weight;
    prevPos[pi*3] += dx*weight; prevPos[pi*3+1] += dy*weight; prevPos[pi*3+2] += dz*weight;
  }

  // Track velocity
  dragVelocity.set(pos[grabbed*3]-prevDragPos.x, pos[grabbed*3+1]-prevDragPos.y, pos[grabbed*3+2]-prevDragPos.z);
  prevDragPos.set(pos[grabbed*3], pos[grabbed*3+1], pos[grabbed*3+2]);

  // Emit trail
  emitTrailParticles(new THREE.Vector3(pos[grabbed*3], pos[grabbed*3+1], pos[grabbed*3+2]), 4);
}

function onPointerUp(e) {
  if (!isDragging || grabbed < 0) return;

  // If didn't drag (just clicked) → ripple + palette change
  if (!dragMoved) {
    const wp = new THREE.Vector3(pos[grabbed*3], pos[grabbed*3+1], pos[grabbed*3+2]);
    addRipple(wp);
    switchPalette();
  } else {
    // Transfer momentum (clamped)
    const throwVel = dragVelocity.clone().multiplyScalar(P.throwMultiplier);
    const speed = throwVel.length();
    if (speed > P.maxThrowSpeed) throwVel.multiplyScalar(P.maxThrowSpeed / speed);

    for (const [pi, weight] of grabInfluence) {
      vel[pi*3]   += throwVel.x * weight;
      vel[pi*3+1] += throwVel.y * weight;
      vel[pi*3+2] += throwVel.z * weight;
    }
  }

  invMass[grabbed] = 1.0;
  grabbed = -1;
  isDragging = false;
  dragMoved = false;
  grabInfluence.clear();
  releaseTime = time;
}

renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);
renderer.domElement.addEventListener('pointerleave', onPointerUp);

// ═══════════════════════════════════════════════
// SPARKLE TRAIL
// ═══════════════════════════════════════════════
function emitTrailParticles(worldPos, count) {
  for (let i = 0; i < count; i++) {
    const ti = (trailHead + trailCount) % MAX_TRAIL;
    trailPositions[ti*3]   = worldPos.x + (Math.random()-0.5)*0.08;
    trailPositions[ti*3+1] = worldPos.y + (Math.random()-0.5)*0.08;
    trailPositions[ti*3+2] = worldPos.z + (Math.random()-0.5)*0.04;
    trailAlphas[ti] = 0.8 + Math.random()*0.2;
    trailSizes[ti] = 2.0 + Math.random()*3.0;
    if (trailCount < MAX_TRAIL) trailCount++;
    else trailHead = (trailHead+1) % MAX_TRAIL;
  }
}

function updateTrail(dt) {
  for (let j = 0; j < trailCount; j++) {
    const ti = (trailHead+j) % MAX_TRAIL;
    trailAlphas[ti] -= dt * P.trailFadeRate;
    trailPositions[ti*3+1] += dt * P.trailDrift;
    trailPositions[ti*3+2] += (Math.random()-0.5) * dt * 0.01;
  }
  while (trailCount > 0 && trailAlphas[trailHead] <= 0) {
    trailHead = (trailHead+1) % MAX_TRAIL;
    trailCount--;
  }
}

const trailGeo = new THREE.BufferGeometry();
const trailPosAttr = new THREE.BufferAttribute(trailPositions, 3); trailPosAttr.setUsage(THREE.DynamicDrawUsage);
trailGeo.setAttribute('position', trailPosAttr);
const trailAlphaAttr = new THREE.BufferAttribute(trailAlphas, 1); trailAlphaAttr.setUsage(THREE.DynamicDrawUsage);
trailGeo.setAttribute('alpha', trailAlphaAttr);
const trailSizeAttr = new THREE.BufferAttribute(trailSizes, 1); trailSizeAttr.setUsage(THREE.DynamicDrawUsage);
trailGeo.setAttribute('size', trailSizeAttr);

const trailMat = new THREE.ShaderMaterial({
  vertexShader: `
    attribute float alpha; attribute float size; varying float vAlpha;
    void main() { vAlpha=alpha; vec4 mv=modelViewMatrix*vec4(position,1.0); gl_PointSize=size*(300.0/-mv.z); gl_Position=projectionMatrix*mv; }
  `,
  fragmentShader: `
    varying float vAlpha;
    void main() { float d=length(gl_PointCoord-0.5)*2.0; if(d>1.0)discard; float g=exp(-d*3.0); float s=pow(max(0.0,1.0-d),8.0); float a=(g*0.5+s*0.8)*vAlpha; gl_FragColor=vec4(mix(vec3(0.9,0.85,0.7),vec3(1),s),a); }
  `,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
});
scene.add(new THREE.Points(trailGeo, trailMat));

// ═══════════════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════════════
let time = 0;

function applyExternalForces(dt) {
  time += dt;
  const windMult = P.windMultBase + audioBands.bass * P.windMultBass + audioBands.subBass * P.windMultSubBass;
  const displace = audioBands.subBass * P.displaceSubBass;

  for (let i = 0; i < numParticles; i++) {
    if (invMass[i]===0) continue;
    vel[i*3+1] += P.gravity * dt * P.gravityDtMult;
    const px=pos[i*3], py=pos[i*3+1], pz=pos[i*3+2], t=time;

    const windX = (Math.sin(t*0.3+py*2)*0.15 + Math.sin(t*0.7+pz*1.5)*0.08) * 0.5 * windMult;
    const windY = (Math.cos(t*0.25+px*1.8)*0.1 + Math.sin(t*0.5)*0.05) * 0.5 * windMult;
    const windZ = (Math.sin(t*0.4+px*2.2+py*1.3)*0.2 + Math.cos(t*0.15)*0.15 + Math.sin(t*0.8+py*3)*0.06) * 0.5 * windMult;

    vel[i*3] += windX*dt; vel[i*3+1] += windY*dt; vel[i*3+2] += windZ*dt;

    // Audio breathing
    vel[i*3+2] += displace * Math.sin(t*2+px*3+py*3) * dt * P.breathingMult;
    // Audio sway
    vel[i*3] += audioBands.lowMid * Math.sin(t*1.5+py*2.5) * dt * P.swayMult;
  }
}

function applyAeroDrag(dt) {
  for (let r=0; r<ROWS-1; r++) for (let c=0; c<COLS-1; c++) {
    const i0=idx(r,c), i1=idx(r,c+1), i2=idx(r+1,c);
    triDrag(i0,i1,i2,dt); triDrag(i1,idx(r+1,c+1),i2,dt);
  }
}

function triDrag(i0,i1,i2,dt) {
  const vx=(vel[i0*3]+vel[i1*3]+vel[i2*3])/3;
  const vy=(vel[i0*3+1]+vel[i1*3+1]+vel[i2*3+1])/3;
  const vz=(vel[i0*3+2]+vel[i1*3+2]+vel[i2*3+2])/3;
  const e1x=pos[i1*3]-pos[i0*3],e1y=pos[i1*3+1]-pos[i0*3+1],e1z=pos[i1*3+2]-pos[i0*3+2];
  const e2x=pos[i2*3]-pos[i0*3],e2y=pos[i2*3+1]-pos[i0*3+1],e2z=pos[i2*3+2]-pos[i0*3+2];
  const nx=e1y*e2z-e1z*e2y,ny=e1z*e2x-e1x*e2z,nz=e1x*e2y-e1y*e2x;
  const area=Math.sqrt(nx*nx+ny*ny+nz*nz)*0.5;
  if(area<1e-8)return;
  const nnx=nx/(area*2),nny=ny/(area*2),nnz=nz/(area*2);
  const vDotN=vx*nnx+vy*nny+vz*nnz;
  const speed=Math.sqrt(vx*vx+vy*vy+vz*vz);
  if(speed<1e-8)return;
  const dm=0.5*P.airDensity*P.dragCoeff*area*Math.abs(vDotN)*speed;
  const fx=-dm*vx/speed/3,fy=-dm*vy/speed/3,fz=-dm*vz/speed/3;
  for(const i of[i0,i1,i2]){vel[i*3]+=fx*dt*invMass[i];vel[i*3+1]+=fy*dt*invMass[i];vel[i*3+2]+=fz*dt*invMass[i];}
}

// Rest return — ramps up stiffness after release
function applyRestReturn(dt) {
  if (isDragging) return;
  const timeSinceRelease = time - releaseTime;
  const rampedK = Math.min(P.restReturnMaxK, P.restReturnMinK + timeSinceRelease * P.restReturnRamp);

  for (let i = 0; i < numParticles; i++) {
    if (invMass[i]===0) continue;
    const dx=restPos[i*3]-pos[i*3], dy=restPos[i*3+1]-pos[i*3+1], dz=restPos[i*3+2]-pos[i*3+2];
    vel[i*3]   += dx * rampedK * dt * 60;
    vel[i*3+1] += dy * rampedK * dt * 60;
    vel[i*3+2] += dz * rampedK * dt * 60;
  }
}

// Velocity clamping
function clampVelocities() {
  for (let i = 0; i < numParticles; i++) {
    const speed = Math.sqrt(vel[i*3]**2 + vel[i*3+1]**2 + vel[i*3+2]**2);
    if (speed > P.velClampSpeed) {
      const s = P.velClampSpeed / speed;
      vel[i*3]*=s; vel[i*3+1]*=s; vel[i*3+2]*=s;
    }
  }
}

function applyCentring() {
  let cx=0,cy=0,cz=0;
  for(let i=0;i<numParticles;i++){cx+=pos[i*3];cy+=pos[i*3+1];cz+=pos[i*3+2];}
  cx/=numParticles;cy/=numParticles;cz/=numParticles;
  for(let i=0;i<numParticles;i++){
    pos[i*3]-=cx*P.centringK;pos[i*3+1]-=cy*P.centringK;pos[i*3+2]-=cz*P.centringK;
    prevPos[i*3]-=cx*P.centringK;prevPos[i*3+1]-=cy*P.centringK;prevPos[i*3+2]-=cz*P.centringK;
  }
}

function resetClothState() {
  for (let i = 0; i < numParticles; i++) {
    pos[i*3]     = restPos[i*3];
    pos[i*3+1]   = restPos[i*3+1];
    pos[i*3+2]   = restPos[i*3+2];
    prevPos[i*3]   = restPos[i*3];
    prevPos[i*3+1] = restPos[i*3+1];
    prevPos[i*3+2] = restPos[i*3+2];
    vel[i*3] = 0; vel[i*3+1] = 0; vel[i*3+2] = 0;
    invMass[i] = 1.0;
  }
  ripples.length = 0;
  grabbed = -1;
  isDragging = false;
  dragMoved = false;
  grabInfluence.clear();
  releaseTime = time;
}

function simulate() {
  const dt = 1/60/P.substeps;
  for (let sub = 0; sub < P.substeps; sub++) {
    applyExternalForces(dt);
    applyAeroDrag(dt);
    applyRestReturn(dt);
    applyRipples();

    for (let i=0;i<numParticles;i++) {
      if(invMass[i]===0)continue;
      vel[i*3]*=P.damping;vel[i*3+1]*=P.damping;vel[i*3+2]*=P.damping;
      prevPos[i*3]=pos[i*3];prevPos[i*3+1]=pos[i*3+1];prevPos[i*3+2]=pos[i*3+2];
      pos[i*3]+=vel[i*3]*dt;pos[i*3+1]+=vel[i*3+1]*dt;pos[i*3+2]+=vel[i*3+2]*dt;
    }

    for(let iter=0;iter<P.iterations;iter++){
      for(const c of distConstraints) solveConstraint(c,P.stretchCompliance,dt);
      for(const c of bendConstraints) solveConstraint(c,P.bendCompliance,dt);
    }

    for(let i=0;i<numParticles;i++){
      if(invMass[i]===0)continue;
      vel[i*3]=(pos[i*3]-prevPos[i*3])/dt;
      vel[i*3+1]=(pos[i*3+1]-prevPos[i*3+1])/dt;
      vel[i*3+2]=(pos[i*3+2]-prevPos[i*3+2])/dt;
    }
  }
  clampVelocities();
  applyCentring();
}

// ═══════════════════════════════════════════════
// TEXTURE GEN
// ═══════════════════════════════════════════════
const TEX_SIZE = 1024;

function generateShweshweTexture() {
  const canvas=document.createElement('canvas'); canvas.width=TEX_SIZE; canvas.height=TEX_SIZE;
  const ctx=canvas.getContext('2d'); const pri=palette.primary,acc=palette.accent,mid=palette.mid;
  const data=ctx.createImageData(TEX_SIZE,TEX_SIZE); const px=data.data;
  for(let y=0;y<TEX_SIZE;y++)for(let x=0;x<TEX_SIZE;x++){
    const i=(y*TEX_SIZE+x)*4;const cs=32;const cx=x%cs,cy=y%cs;
    const cX=Math.floor(x/cs),cY=Math.floor(y/cs);const ch=(cX+cY)%2===0;
    const nx=cx/cs,ny=cy/cs;const dm=Math.abs(nx-0.5)+Math.abs(ny-0.5);
    const r1=Math.abs(dm-0.2)<0.04,r2=Math.abs(dm-0.35)<0.03;const dR=0.08;
    const dot=(nx<dR&&ny<dR)||(nx>1-dR&&ny<dR)||(nx<dR&&ny>1-dR)||(nx>1-dR&&ny>1-dR);
    const cr=(Math.abs(nx-0.5)<0.03&&Math.abs(ny-0.5)<0.15)||(Math.abs(ny-0.5)<0.03&&Math.abs(nx-0.5)<0.15);
    const gl=(cx%4===0)||(cy%4===0);const sc=8;const sx=(x%sc)/sc,sy=(y%sc)/sc;
    const md=Math.abs(sx-0.5)+Math.abs(sy-0.5)<0.25;
    let col;
    if(ch){col=[...pri];if(r1||r2)col=[...acc];else if(dm<0.15)col=[acc[0]*0.95,acc[1]*0.95,acc[2]*0.95];
    else if(dot)col=[...acc];else if(cr&&dm>0.25)col=[mid[0]*1.2,mid[1]*1.2,mid[2]*1.2];
    else if(md&&!gl)col=[pri[0]*1.1,pri[1]*1.1,pri[2]*1.1];else if(gl)col=[pri[0]*0.85,pri[1]*0.85,pri[2]*0.85];
    }else{col=[...acc];if(r1)col=[...pri];else if(dm<0.12)col=[...pri];else if(dot)col=[...mid];
    else if(gl)col=[acc[0]*0.92,acc[1]*0.92,acc[2]*0.92];else if(md)col=[acc[0]*0.96,acc[1]*0.96,acc[2]*0.96];}
    const ns=(Math.sin(x*47.3+y*31.7)*0.5+0.5)*0.03-0.015;
    px[i]=Math.min(255,Math.max(0,(col[0]+ns)*255));px[i+1]=Math.min(255,Math.max(0,(col[1]+ns)*255));
    px[i+2]=Math.min(255,Math.max(0,(col[2]+ns)*255));px[i+3]=255;
  }
  ctx.putImageData(data,0,0);
  const tex=new THREE.CanvasTexture(canvas);tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  tex.anisotropy=renderer.capabilities.getMaxAnisotropy();tex.minFilter=THREE.LinearMipmapLinearFilter;tex.magFilter=THREE.LinearFilter;tex.repeat.set(3,3);return tex;
}

function generateWeaveNormalMap() {
  const sz=512;const canvas=document.createElement('canvas');canvas.width=sz;canvas.height=sz;
  const ctx=canvas.getContext('2d');const data=ctx.createImageData(sz,sz);const px=data.data;
  for(let y=0;y<sz;y++)for(let x=0;x<sz;x++){
    const i=(y*sz+x)*4;const cX=Math.floor(x/4),cY=Math.floor(y/4);const on=(cX+cY)%2===0;const s=0.8;
    const nx=on?Math.cos(x*Math.PI*2/4)*Math.cos(y*Math.PI/8)*s:-Math.sin(y*Math.PI*2/4)*Math.sin(x*Math.PI/8)*s*0.3;
    const ny=on?Math.sin(x*Math.PI*2/4)*(-Math.sin(y*Math.PI/8))*s*0.3:Math.cos(y*Math.PI*2/4)*Math.cos(x*Math.PI/8)*s;
    px[i]=Math.min(255,Math.max(0,(nx*0.5+0.5)*255));px[i+1]=Math.min(255,Math.max(0,(ny*0.5+0.5)*255));px[i+2]=200;px[i+3]=255;
  }
  ctx.putImageData(data,0,0);const tex=new THREE.CanvasTexture(canvas);tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  tex.repeat.set(12,12);tex.minFilter=THREE.LinearMipmapLinearFilter;return tex;
}

// ═══════════════════════════════════════════════
// FABRIC SHADER
// ═══════════════════════════════════════════════
const fabricVS = `
varying vec3 vNormal,vWorldPos,vTangent,vBitangent; varying vec2 vUv; attribute vec3 tangent_attr;
void main(){vUv=uv;vNormal=normalize(normalMatrix*normal);vec4 wp=modelMatrix*vec4(position,1.0);vWorldPos=wp.xyz;
vTangent=normalize(normalMatrix*tangent_attr);vBitangent=cross(vNormal,vTangent);gl_Position=projectionMatrix*viewMatrix*wp;}`;

const fabricFS = `
precision highp float;
uniform sampler2D u_diffuseMap,u_normalMap; uniform vec3 u_lightDir1,u_lightDir2,u_lightCol1,u_lightCol2,u_cameraPos;
uniform float u_time,u_audioSheen,u_audioWarmth,u_audioSparkle;
varying vec3 vNormal,vWorldPos,vTangent,vBitangent; varying vec2 vUv;

float anisoSpec(vec3 T,vec3 H,float e){float t=dot(T,H);return pow(sqrt(max(0.,1.-t*t)),e);}
float fresnel(float c,float f){return f+(1.-f)*pow(1.-c,5.);}
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}

void main(){
  vec4 dTex=texture2D(u_diffuseMap,vUv); dTex.rgb+=vec3(0.08,0.03,-0.02)*u_audioWarmth;
  vec3 nm=texture2D(u_normalMap,vUv).xyz*2.-1.; mat3 TBN=mat3(normalize(vTangent),normalize(vBitangent),normalize(vNormal));
  vec3 N=normalize(TBN*nm),V=normalize(u_cameraPos-vWorldPos); float NdV=max(dot(N,V),0.);
  vec3 wT=normalize(vTangent),fT=normalize(vBitangent),color=vec3(0);
  vec3 L[2]; L[0]=normalize(u_lightDir1); L[1]=normalize(u_lightDir2);
  vec3 LC[2]; LC[0]=u_lightCol1; LC[1]=u_lightCol2;
  for(int l=0;l<2;l++){
    vec3 H=normalize(L[l]+V); float w=0.35; float diff=max(0.,(dot(N,L[l])+w)/(1.+w));
    float sW=anisoSpec(wT,H,40.)*0.35,sF=anisoSpec(fT,H,30.)*0.25,F=fresnel(NdV,0.04);
    float sh=pow(1.-NdV,3.)*(0.15+u_audioSheen*0.35);
    float tr=max(0.,dot(V,-L[l]))*0.12;
    color+=LC[l]*(dTex.rgb*diff*0.85+(sW+sF)*F*LC[l]+sh*dTex.rgb*1.5+dTex.rgb*vec3(1.2,0.9,0.8)*tr);
  }
  color+=dTex.rgb*vec3(0.04,0.05,0.07)+pow(1.-NdV,4.)*vec3(0.05,0.08,0.12);
  if(u_audioSparkle>0.05){vec2 sUV=floor(vUv*200.);float sv=hash(sUV+floor(u_time*3.));float th=1.-u_audioSparkle*0.3;
  if(sv>th){float in2=(sv-th)/(1.-th);float sa=hash(sUV*1.7);float vf=pow(abs(sin(sa*6.28+dot(V,N)*3.)),4.);
  color+=vec3(1,.95,.85)*in2*vf*u_audioSparkle*0.6;}}
  if(!gl_FrontFacing)color*=0.6;
  gl_FragColor=vec4(color,1);
}`;

// ═══════════════════════════════════════════════
// MESH
// ═══════════════════════════════════════════════
const geometry = new THREE.BufferGeometry();
const indices = [];
for(let r=0;r<ROWS-1;r++)for(let c=0;c<COLS-1;c++){const i=idx(r,c);indices.push(i,idx(r,c+1),idx(r+1,c),idx(r,c+1),idx(r+1,c+1),idx(r+1,c));}
geometry.setIndex(indices);
const posAttr=new THREE.BufferAttribute(pos,3);posAttr.setUsage(THREE.DynamicDrawUsage);geometry.setAttribute('position',posAttr);
const uvs=new Float32Array(numParticles*2);
for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const i=idx(r,c);uvs[i*2]=c/(COLS-1);uvs[i*2+1]=r/(ROWS-1);}
geometry.setAttribute('uv',new THREE.BufferAttribute(uvs,2));
const normals=new Float32Array(numParticles*3);geometry.setAttribute('normal',new THREE.BufferAttribute(normals,3));
const tangents=new Float32Array(numParticles*3);geometry.setAttribute('tangent_attr',new THREE.BufferAttribute(tangents,3));

function updateNormals(){
  const nm=geometry.attributes.normal.array,tg=geometry.attributes.tangent_attr.array;nm.fill(0);tg.fill(0);
  for(let r=0;r<ROWS-1;r++)for(let c=0;c<COLS-1;c++){
    const a=idx(r,c),b=idx(r,c+1),d=idx(r+1,c);
    const ex=pos[b*3]-pos[a*3],ey=pos[b*3+1]-pos[a*3+1],ez=pos[b*3+2]-pos[a*3+2];
    const fx=pos[d*3]-pos[a*3],fy=pos[d*3+1]-pos[a*3+1],fz=pos[d*3+2]-pos[a*3+2];
    const nx=ey*fz-ez*fy,ny=ez*fx-ex*fz,nz=ex*fy-ey*fx;
    for(const i of[a,b,d]){nm[i*3]+=nx;nm[i*3+1]+=ny;nm[i*3+2]+=nz;}
  }
  for(let i=0;i<numParticles;i++){const l=Math.sqrt(nm[i*3]**2+nm[i*3+1]**2+nm[i*3+2]**2)||1;nm[i*3]/=l;nm[i*3+1]/=l;nm[i*3+2]/=l;}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const i=idx(r,c);let tx,ty,tz;
    if(c<COLS-1){const j=idx(r,c+1);tx=pos[j*3]-pos[i*3];ty=pos[j*3+1]-pos[i*3+1];tz=pos[j*3+2]-pos[i*3+2];}
    else{const j=idx(r,c-1);tx=pos[i*3]-pos[j*3];ty=pos[i*3+1]-pos[j*3+1];tz=pos[i*3+2]-pos[j*3+2];}
    const tl=Math.sqrt(tx*tx+ty*ty+tz*tz)||1;tg[i*3]=tx/tl;tg[i*3+1]=ty/tl;tg[i*3+2]=tz/tl;
  }
  geometry.attributes.normal.needsUpdate=true;geometry.attributes.tangent_attr.needsUpdate=true;
}

let diffuseMap=generateShweshweTexture(), normalMap=generateWeaveNormalMap();
const material=new THREE.ShaderMaterial({
  vertexShader:fabricVS, fragmentShader:fabricFS,
  uniforms:{u_diffuseMap:{value:diffuseMap},u_normalMap:{value:normalMap},
    u_lightDir1:{value:new THREE.Vector3(P.light1X,P.light1Y,P.light1Z).normalize()},
    u_lightDir2:{value:new THREE.Vector3(P.light2X,P.light2Y,P.light2Z).normalize()},
    u_lightCol1:{value:new THREE.Vector3(P.light1R,P.light1G,P.light1B)},
    u_lightCol2:{value:new THREE.Vector3(P.light2R,P.light2G,P.light2B)},
    u_cameraPos:{value:new THREE.Vector3()},u_time:{value:0},u_audioSheen:{value:0},u_audioWarmth:{value:0},u_audioSparkle:{value:0}},
  side:THREE.DoubleSide,
});
const mesh=new THREE.Mesh(geometry,material);scene.add(mesh);

// Ambient particles
const aC=200;const aG=new THREE.BufferGeometry();const aP=new Float32Array(aC*3);
for(let i=0;i<aC;i++){aP[i*3]=(Math.random()-0.5)*10;aP[i*3+1]=(Math.random()-0.5)*10;aP[i*3+2]=(Math.random()-0.5)*10;}
aG.setAttribute('position',new THREE.BufferAttribute(aP,3));
const ambientMat=new THREE.PointsMaterial({color:0xffffff,size:0.008,transparent:true,opacity:0.15,sizeAttenuation:true});
const ambientPts=new THREE.Points(aG,ambientMat);
scene.add(ambientPts);

// Now that ambientMat exists, upgrade the theme updater
updateSceneTheme = function() {
  const bg = isDark ? DARK_BG : LIGHT_BG;
  scene.background.copy(bg);
  scene.fog.color.copy(bg);
  ambientMat.color.set(isDark ? 0xffffff : 0x1a1a1e);
};

// ═══════════════════════════════════════════════
// PALETTE
// ═══════════════════════════════════════════════
function switchPalette(){
  paletteIdx=(paletteIdx+1)%PALETTES.length;palette=PALETTES[paletteIdx];
  if(diffuseMap)diffuseMap.dispose();diffuseMap=generateShweshweTexture();material.uniforms.u_diffuseMap.value=diffuseMap;
  const el=document.getElementById('palette-name');el.textContent=palette.name;el.style.opacity='1';
  setTimeout(()=>{el.style.opacity='0';},2000);
}
document.getElementById('palette-name').textContent=palette.name;

// ═══════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════
const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05), t=clock.getElapsedTime();

  updateAudio(dt);
  simulate();

  geometry.attributes.position.needsUpdate=true;
  updateNormals();
  updateTrail(dt);
  trailGeo.attributes.position.needsUpdate=true;
  trailGeo.attributes.alpha.needsUpdate=true;
  trailGeo.setDrawRange(0,trailCount);

  const aCP=audioBands.bass*P.camAudioPush;
  camera.position.set(
    Math.sin(t*P.camSpeed)*(P.camRadius+aCP),
    Math.sin(t*P.camSpeed*0.7)*P.camVertAmp+P.camVertOffset,
    Math.cos(t*P.camSpeed)*(P.camRadius+aCP)
  );
  camera.lookAt(0,0,0);

  material.uniforms.u_cameraPos.value.copy(camera.position);
  material.uniforms.u_time.value=t;
  material.uniforms.u_audioSheen.value=audioBands.high;
  material.uniforms.u_audioWarmth.value=audioBands.mid;
  material.uniforms.u_audioSparkle.value=audioBands.highMid;

  // Update light directions and colours from P
  material.uniforms.u_lightDir1.value.set(P.light1X+Math.sin(t*0.2)*0.3, P.light1Y, P.light1Z+Math.cos(t*0.15)*0.3).normalize();
  material.uniforms.u_lightDir2.value.set(P.light2X, P.light2Y, P.light2Z).normalize();
  material.uniforms.u_lightCol1.value.set(P.light1R, P.light1G, P.light1B);
  material.uniforms.u_lightCol2.value.set(P.light2R, P.light2G, P.light2B);

  const pp=ambientPts.geometry.attributes.position.array;
  for(let i=0;i<aC;i++){pp[i*3+1]+=0.001;if(pp[i*3+1]>5)pp[i*3+1]=-5;}
  ambientPts.geometry.attributes.position.needsUpdate=true;

  // Update band meters in dev panel
  updateBandMeters();

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
