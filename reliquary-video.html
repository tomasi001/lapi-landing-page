<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
  #ui {

  #ui > * { pointer-events: auto; }
  #preview-container {
    position: relative; width: 270px; height: 480px;
    border: 1px solid #333; border-radius: 8px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);

  #preview-container canvas { width: 100% !important; height: 100% !important; }
  .controls { margin-top: 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .btn {
    padding: 12px 32px; font-size: 14px; font-weight: 600; letter-spacing: 0.05em;
    border: 1px solid #444; background: #222; color: #eee; border-radius: 6px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn:hover { background: #333; border-color: #666; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn.primary { background: #1a6; border-color: #1a6; color: #fff; }
  .btn.primary:hover { background: #1b7; }
  #progress-wrap {
    width: 270px; height: 4px; background: #222; border-radius: 2px; overflow: hidden;
    margin-top: 16px; display: none;
  }
  #progress-bar { width: 0%; height: 100%; background: #1a6; transition: width 0.1s; }
  #status { margin-top: 8px; font-size: 12px; color: #888; text-align: center; min-height: 18px; }
  .row { display: flex; gap: 8px; align-items: center; }
  select { padding: 8px 12px; background: #222; color: #eee; border: 1px solid #444; border-radius: 6px; font-size: 13px; }
  label { font-size: 12px; color: #888; }
  #ffmpeg-cmd {
    margin-top: 16px; padding: 12px; background: #1a1a1a; border: 1px solid #333;
    border-radius: 6px; font-family: monospace; font-size: 11px; color: #aaa;
    max-width: 500px; word-break: break-all; display: none; user-select: all;
  }

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const BASE_W = 1080;
const BASE_H = 1920;
const DURATION = 55;

const ACT = {
  SEAM: { start: 0, end: 9 },
  TRIAL: { start: 9, end: 16 },
  REVEAL: { start: 16, end: 22 },
  CHANNELS: { start: 22, end: 28 },
  WEIGH: { start: 28, end: 36 },
  LOCK: { start: 36, end: 42 },
  HANDOFF: { start: 42, end: 50 },
  BLACK: { start: 50, end: 55 },
};

function clamp(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }
function lerp(a, b, t) { return a + (b - a) * t; }
function mix(a, b, t) { return a + (b - a) * t; }
function smoothstep(e0, e1, x) {
  const t = clamp((x - e0) / (e1 - e0), 0, 1);
  return t * t * (3 - 2 * t);
}
function smootherstep(e0, e1, x) {
  const t = clamp((x - e0) / (e1 - e0), 0, 1);
  return t * t * t * (t * (t * 6 - 15) + 10);
}
function mapRange(v, a, b, c, d) {
  return c + (d - c) * clamp((v - a) / (b - a), 0, 1);
}
function catmullRom(points, t) {
  const n = points.length;
  const f = t * (n - 1);
  const i = Math.floor(f);
  const frac = f - i;
  const p0 = points[Math.max(0, i - 1)];
  const p1 = points[i];
  const p2 = points[Math.min(n - 1, i + 1)];
  const p3 = points[Math.min(n - 1, i + 2)];
  const tt = frac;
  const tt2 = tt * tt;
  const tt3 = tt2 * tt;
  return new THREE.Vector3(
    0.5 * ((2 * p1.x) + (-p0.x + p2.x) * tt + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * tt2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * tt3),
    0.5 * ((2 * p1.y) + (-p0.y + p2.y) * tt + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * tt2 + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * tt3),
    0.5 * ((2 * p1.z) + (-p0.z + p2.z) * tt + (2 * p0.z - 5 * p1.z + 4 * p2.z - p3.z) * tt2 + (-p0.z + 3 * p1.z - 3 * p2.z + p3.z) * tt3)
  );
}

function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1.0;
  const x = clamp(t, 0, 1) - 1.0;
  return 1.0 + c3 * x * x * x + c1 * x * x;
}

function makeCanvas(size = 1024) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  return canvas;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function createIconTexture(symbolIndex) {
  const canvas = makeCanvas(1024);
  const ctx = canvas.getContext('2d');
  const size = canvas.width;

  ctx.clearRect(0, 0, size, size);

  const shadowGrad = ctx.createRadialGradient(size * 0.5, size * 0.45, size * 0.05, size * 0.5, size * 0.5, size * 0.5);
  shadowGrad.addColorStop(0, 'rgba(32,44,58,0.28)');
  shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = shadowGrad;
  ctx.fillRect(0, 0, size, size);

  roundRect(ctx, 168, 144, 688, 736, 124);
  const badgeFill = ctx.createLinearGradient(180, 120, 860, 920);
  badgeFill.addColorStop(0, 'rgba(11,16,22,0.94)');
  badgeFill.addColorStop(1, 'rgba(18,26,34,0.88)');
  ctx.fillStyle = badgeFill;
  ctx.fill();

  ctx.save();
  ctx.globalAlpha = 0.6;
  roundRect(ctx, 186, 162, 652, 700, 110);
  const sheen = ctx.createLinearGradient(240, 120, 800, 900);
  sheen.addColorStop(0, 'rgba(255,255,255,0.1)');
  sheen.addColorStop(0.45, 'rgba(255,255,255,0.0)');
  sheen.addColorStop(1, 'rgba(80,120,180,0.08)');
  ctx.fillStyle = sheen;
  ctx.fill();
  ctx.restore();

  roundRect(ctx, 168, 144, 688, 736, 124);
  ctx.lineWidth = 8;
  ctx.strokeStyle = 'rgba(170,188,214,0.22)';
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(512, 512, 250, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(110,140,175,0.12)';
  ctx.lineWidth = 6;
  ctx.stroke();

  const stroke = '#e7eef8';
  const softStroke = 'rgba(231,238,248,0.35)';
  const line = (color, width = 66) => {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  };

  if (symbolIndex === 0) {
    ctx.beginPath();
    ctx.arc(512, 512, 208, 0, Math.PI * 2);
    line(stroke, 48);

    ctx.beginPath();
    ctx.moveTo(512, 360);
    ctx.lineTo(512, 668);
    line(stroke, 38);

    ctx.beginPath();
    ctx.moveTo(610, 410);
    ctx.lineTo(452, 410);
    ctx.bezierCurveTo(404, 410, 388, 438, 388, 470);
    ctx.bezierCurveTo(388, 508, 418, 526, 456, 526);
    ctx.lineTo(572, 526);
    ctx.bezierCurveTo(618, 526, 636, 556, 636, 594);
    ctx.bezierCurveTo(636, 626, 616, 654, 566, 654);
    ctx.lineTo(414, 654);
    line(stroke, 38);
  } else if (symbolIndex === 1) {
    ctx.beginPath();
    ctx.arc(512, 488, 206, 0, Math.PI * 2);
    line(stroke, 46);

    ctx.beginPath();
    ctx.moveTo(412, 688);
    ctx.lineTo(340, 778);
    ctx.lineTo(372, 646);
    line(stroke, 42);

    for (const x of [422, 512, 602]) {
      ctx.beginPath();
      ctx.arc(x, 490, 20, 0, Math.PI * 2);
      ctx.fillStyle = stroke;
      ctx.fill();
    }
  } else if (symbolIndex === 2) {
    roundRect(ctx, 270, 326, 484, 348, 72);
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 42;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(300, 370);
    ctx.lineTo(512, 534);
    ctx.lineTo(724, 370);
    line(stroke, 34);

    ctx.beginPath();
    ctx.moveTo(304, 622);
    ctx.lineTo(484, 482);
    ctx.moveTo(720, 622);
    ctx.lineTo(540, 482);
    line(softStroke, 22);
  } else {
    ctx.beginPath();
    ctx.arc(512, 490, 210, 0, Math.PI * 2);
    line(stroke, 46);

    ctx.beginPath();
    ctx.moveTo(430, 360);
    ctx.bezierCurveTo(430, 272, 504, 232, 586, 232);
    ctx.bezierCurveTo(676, 232, 740, 286, 740, 370);
    ctx.bezierCurveTo(740, 434, 702, 478, 632, 524);
    ctx.bezierCurveTo(572, 564, 548, 602, 548, 646);
    line(stroke, 44);

    ctx.beginPath();
    ctx.arc(548, 760, 28, 0, Math.PI * 2);
    ctx.fillStyle = stroke;
    ctx.fill();
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.needsUpdate = true;
  return texture;
}

function createGlowTexture(symbolIndex) {
  const canvas = makeCanvas(512);
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  const pair = ['rgba(198,224,255,0.8)', 'rgba(90,150,255,0.0)'];
  const grad = ctx.createRadialGradient(size * 0.5, size * 0.5, 12, size * 0.5, size * 0.5, size * 0.42);
  grad.addColorStop(0, pair[0]);
  grad.addColorStop(1, pair[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  texture.needsUpdate = true;
  return texture;
}

function createIconStack(symbolIndex) {
  const group = new THREE.Group();
  const iconTex = createIconTexture(symbolIndex);
  const glowTex = createGlowTexture(symbolIndex);

  const shadowMat = new THREE.MeshBasicMaterial({
    map: iconTex,
    transparent: true,
    color: 0x000000,
    opacity: 0.3,
    depthWrite: false,
  });
  const glowMat = new THREE.MeshBasicMaterial({
    map: glowTex,
    transparent: true,
    opacity: 0.65,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  const frontMat = new THREE.MeshBasicMaterial({
    map: iconTex,
    transparent: true,
    opacity: 1.0,
    depthWrite: false,
  });

  const shadow = new THREE.Mesh(new THREE.PlaneGeometry(0.66, 0.86), shadowMat);
  shadow.position.set(0.018, -0.02, -0.01);
  group.add(shadow);

  const glow = new THREE.Mesh(new THREE.PlaneGeometry(0.94, 1.18), glowMat);
  glow.position.z = -0.015;
  group.add(glow);

  const front = new THREE.Mesh(new THREE.PlaneGeometry(0.68, 0.88), frontMat);
  front.position.z = 0.008;
  group.add(front);

  group.position.z = -0.025;
  group.scale.setScalar(0.82);

  return { group, frontMat, glowMat, shadowMat, shadow };
}

const shellVertexShader = /* glsl */`
  varying vec3 vWorldPos;
  varying vec3 vWorldNormal;
  varying vec3 vLocalPos;
  varying vec3 vViewDir;
  varying vec2 vUv;

  void main() {
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vWorldPos = worldPos.xyz;
    vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
    vLocalPos = position;
    vViewDir = normalize(cameraPosition - worldPos.xyz);
    vUv = uv;
    gl_Position = projectionMatrix * viewMatrix * worldPos;
  }
`;

const shellFragmentShader = /* glsl */`
  precision highp float;

  varying vec3 vWorldPos;
  varying vec3 vWorldNormal;
  varying vec3 vLocalPos;
  varying vec3 vViewDir;
  varying vec2 vUv;

  uniform vec3 u_keyLightDir;
  uniform vec3 u_keyLightColor;
  uniform float u_keyLightIntensity;
  uniform vec3 u_fillLightDir;
  uniform vec3 u_fillLightColor;
  uniform float u_fillLightIntensity;
  uniform vec3 u_rimLightDir;
  uniform float u_rimLightIntensity;
  uniform float u_time;
  uniform float u_thermal;
  uniform float u_coreGlow;
  uniform float u_cold;
  uniform vec3 u_bounds;

  float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
  }

  void main() {
    vec3 N = normalize(vWorldNormal);
    vec3 V = normalize(vViewDir);
    float NdotV = max(dot(N, V), 0.0);
    float fresnel = pow(1.0 - NdotV, 5.0);

    float grainAxis = dot(vWorldPos.xz, normalize(vec2(0.82, 0.18)));
    float grain1 = fract(sin(grainAxis * 820.0 + vWorldPos.y * 110.0) * 43758.5453);
    float grain2 = fract(sin(grainAxis * 3200.0 + vWorldPos.x * 240.0) * 12345.6789);
    float grain3 = hash(vWorldPos.xy * 90.0 + vWorldPos.z * 40.0);
    float brushed = mix(0.95, 1.06, grain1 * 0.45 + grain2 * 0.35 + grain3 * 0.2);

    vec3 baseColor = vec3(0.1, 0.105, 0.112) * brushed;

    vec3 L1 = normalize(u_keyLightDir);
    vec3 L2 = normalize(u_fillLightDir);
    vec3 L3 = normalize(u_rimLightDir);
    float diff1 = max(dot(N, L1), 0.0);
    float diff2 = max(dot(N, L2), 0.0);
    float spec1 = pow(max(dot(reflect(-L1, N), V), 0.0), 72.0);
    float spec2 = pow(max(dot(reflect(-L2, N), V), 0.0), 42.0);
    vec3 tangent = normalize(cross(N, vec3(0.0, 1.0, 0.003)));
    vec3 H = normalize(V + L1);
    float TdotH = dot(tangent, H);
    float aniso = exp(-TdotH * TdotH * 18.0) * pow(max(dot(N, H), 0.0), 38.0);
    float rim = pow(1.0 - NdotV, 3.0) * max(dot(N, L3), 0.0);

    float seamX = 1.0 - smoothstep(0.0, 0.016, abs(abs(vLocalPos.x) - u_bounds.x * 0.94));
    float seamZ = 1.0 - smoothstep(0.0, 0.016, abs(abs(vLocalPos.z) - u_bounds.z * 0.94));
    float belt = 1.0 - smoothstep(0.0, 0.028, abs(abs(vLocalPos.y) - u_bounds.y * 0.38));
    float panelBreak = 1.0 - smoothstep(0.0, 0.014, abs(fract((vLocalPos.y / max(u_bounds.y, 0.001)) * 5.0 + 0.5) - 0.5));
    float panelMask = panelBreak * 0.22;

    float edgeMetric = max(max(abs(vLocalPos.x) / max(u_bounds.x, 0.001), abs(vLocalPos.y) / max(u_bounds.y, 0.001)), abs(vLocalPos.z) / max(u_bounds.z, 0.001));
    float edgePolish = smoothstep(0.72, 0.98, edgeMetric);

    vec3 diffuse = baseColor * (
      diff1 * u_keyLightColor * u_keyLightIntensity +
      diff2 * u_fillLightColor * u_fillLightIntensity +
      0.025
    );
    vec3 specular = (spec1 * 0.7 + spec2 * 0.28 + aniso * 0.5) * vec3(0.82, 0.85, 0.9);
    vec3 color = diffuse + specular + rim * u_rimLightIntensity * vec3(0.42, 0.47, 0.58);

    color += edgePolish * vec3(0.12, 0.14, 0.18) * (0.5 + fresnel * 0.7);
    color *= 1.0 - panelMask * 0.07;

    float seamMask = clamp(seamX + seamZ + belt * 0.65, 0.0, 1.0);
    float pulse = 0.75 + 0.25 * sin(u_time * 2.8 + vLocalPos.y * 4.0);
    vec3 heatColor = mix(vec3(0.75, 0.16, 0.03), vec3(1.0, 0.5, 0.12), fresnel);
    color += heatColor * seamMask * u_thermal * pulse * 2.4;
    color += vec3(0.05, 0.08, 0.12) * seamMask * u_coreGlow * 0.6;

    color = mix(color, color + vec3(0.02, 0.04, 0.07), fresnel * 0.35 + u_cold * 0.3);
    gl_FragColor = vec4(color, 1.0);
  }
`;

const coreVertexShader = /* glsl */`
  varying vec3 vWorldPos;
  varying vec3 vLocalPos;
  varying vec3 vWorldNormal;
  void main() {
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vWorldPos = worldPos.xyz;
    vLocalPos = position;
    vWorldNormal = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
    gl_Position = projectionMatrix * viewMatrix * worldPos;
  }
`;

const coreFragmentShader = /* glsl */`
  precision highp float;

  varying vec3 vWorldPos;
  varying vec3 vLocalPos;
  varying vec3 vWorldNormal;

  uniform vec3 u_color;
  uniform float u_time;
  uniform float u_intensity;
  uniform float u_thermal;

  void main() {
    float axial = smoothstep(0.0, 1.0, 1.0 - abs(vLocalPos.y) / 1.65);
    float pulse = 0.55 + 0.45 * sin(u_time * 2.2 - vLocalPos.y * 3.5);
    float swirl = 0.5 + 0.5 * sin(vLocalPos.y * 8.0 + atan(vLocalPos.x, vLocalPos.z) * 2.0 - u_time * 3.0);
    float intensity = u_intensity * axial * (0.65 + pulse * 0.35 + swirl * 0.25) + u_thermal * 1.5;
    vec3 base = vec3(0.03, 0.045, 0.055);
    vec3 thermalColor = vec3(1.0, 0.42, 0.14) * u_thermal;
    vec3 color = mix(base, u_color, clamp(intensity, 0.0, 1.0));
    color += u_color * intensity * 0.7;
    color += thermalColor * axial;
    gl_FragColor = vec4(color, 0.95);
  }
`;

const chamberVertexShader = /* glsl */`
  varying vec2 vUv;
  varying vec3 vWorldPos;
  void main() {
    vUv = uv;
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vWorldPos = worldPos.xyz;
    gl_Position = projectionMatrix * viewMatrix * worldPos;
  }
`;

const chamberFragmentShader = /* glsl */`
  precision highp float;

  varying vec2 vUv;
  varying vec3 vWorldPos;

  uniform int u_symbol;
  uniform float u_reveal;
  uniform float u_accent;
  uniform float u_time;
  uniform float u_thermal;
  uniform float u_locked;

  float sdCircle(vec2 p, float r) { return length(p) - r; }
  float sdBox(vec2 p, vec2 b) {
    vec2 d = abs(p) - b;
    return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);
  }
  float sdSegment(vec2 p, vec2 a, vec2 b) {
    vec2 pa = p - a;
    vec2 ba = b - a;
    float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
    return length(pa - ba * h);
  }
  float sdTriangle(vec2 p, vec2 a, vec2 b, vec2 c) {
    vec2 e0 = b - a;
    vec2 e1 = c - b;
    vec2 e2 = a - c;
    vec2 v0 = p - a;
    vec2 v1 = p - b;
    vec2 v2 = p - c;
    vec2 pq0 = v0 - e0 * clamp(dot(v0, e0) / dot(e0, e0), 0.0, 1.0);
    vec2 pq1 = v1 - e1 * clamp(dot(v1, e1) / dot(e1, e1), 0.0, 1.0);
    vec2 pq2 = v2 - e2 * clamp(dot(v2, e2) / dot(e2, e2), 0.0, 1.0);
    float s = sign(e0.x * e2.y - e0.y * e2.x);
    vec2 d0 = vec2(dot(pq0, pq0), s * (v0.x * e0.y - v0.y * e0.x));
    vec2 d1 = vec2(dot(pq1, pq1), s * (v1.x * e1.y - v1.y * e1.x));
    vec2 d2 = vec2(dot(pq2, pq2), s * (v2.x * e2.y - v2.y * e2.x));
    vec2 d = min(min(d0, d1), d2);
    return -sqrt(d.x) * sign(d.y);
  }

  float circleDollarSDF(vec2 p) {
    float ring = abs(length(p) - 0.24) - 0.03;
    float stem = sdSegment(p, vec2(0.0, -0.18), vec2(0.0, 0.18)) - 0.02;
    float top = sdSegment(p, vec2(0.12, -0.11), vec2(-0.07, -0.11)) - 0.02;
    float mid = sdSegment(p, vec2(-0.07, -0.11), vec2(-0.12, 0.0)) - 0.02;
    float low = sdSegment(p, vec2(-0.12, 0.0), vec2(0.09, 0.0)) - 0.02;
    float tail = sdSegment(p, vec2(0.09, 0.0), vec2(0.12, 0.12)) - 0.02;
    float bottom = sdSegment(p, vec2(0.12, 0.12), vec2(-0.12, 0.12)) - 0.02;
    float dollar = min(min(min(min(top, mid), low), tail), min(bottom, stem));
    return min(ring, dollar);
  }

  float messageCircleSDF(vec2 p) {
    float ring = abs(length(p - vec2(0.0, -0.03)) - 0.24) - 0.03;
    float tailA = sdSegment(p, vec2(-0.09, 0.18), vec2(-0.18, 0.31)) - 0.022;
    float tailB = sdSegment(p, vec2(-0.18, 0.31), vec2(-0.1, 0.13)) - 0.022;
    float dot1 = sdCircle(p - vec2(-0.11, -0.02), 0.028);
    float dot2 = sdCircle(p - vec2(0.0, -0.02), 0.028);
    float dot3 = sdCircle(p - vec2(0.11, -0.02), 0.028);
    return min(min(min(ring, tailA), tailB), min(min(dot1, dot2), dot3));
  }

  float mailSDF(vec2 p) {
    float boxD = sdBox(p, vec2(0.22, 0.14));
    float flap1 = sdSegment(p, vec2(-0.22, 0.14), vec2(0.0, -0.02)) - 0.018;
    float flap2 = sdSegment(p, vec2(0.22, 0.14), vec2(0.0, -0.02)) - 0.018;
    float fold = sdSegment(p, vec2(-0.22, -0.14), vec2(0.0, 0.02)) - 0.018;
    float fold2 = sdSegment(p, vec2(0.22, -0.14), vec2(0.0, 0.02)) - 0.018;
    return min(min(boxD, flap1), min(min(flap2, fold), fold2));
  }

  float helpCircleSDF(vec2 p) {
    float ring = abs(length(p) - 0.25) - 0.03;
    float arc = abs(length(p - vec2(0.0, -0.05)) - 0.13) - 0.02;
    float topArc = max(arc, -(p.y + 0.02));
    float stem = sdSegment(p, vec2(0.07, 0.03), vec2(0.0, 0.14)) - 0.02;
    float dot = sdCircle(p - vec2(0.0, 0.23), 0.03);
    return min(min(ring, min(topArc, stem)), dot);
  }

  float symbolSDF(vec2 p, int symbol) {
    if (symbol == 0) return circleDollarSDF(p);
    if (symbol == 1) return messageCircleSDF(p);
    if (symbol == 2) return mailSDF(p);
    return helpCircleSDF(p);
  }

  vec3 accentColor(int symbol) {
    return vec3(0.86, 0.92, 1.0);
  }

  float noise(vec2 p) {
    return fract(sin(dot(p, vec2(13.97, 71.31))) * 43758.5453);
  }

  void main() {
    vec2 p = (vUv - 0.5) * vec2(1.05, 1.45);
    float frame = 1.0 - smoothstep(0.0, 0.01, abs(max(abs(p.x) - 0.28, abs(p.y) - 0.46)));
    float d = symbolSDF(p, u_symbol);
    float line = 1.0 - smoothstep(0.01, 0.035, abs(d));
    float carve = 1.0 - smoothstep(0.0, 0.02, d);
    float revealSweep = smoothstep(-0.55, 0.45, u_reveal - (p.y * 0.7 + length(p) * 0.28));

    vec3 bg = vec3(0.025, 0.03, 0.036);
    float grain = noise(vUv * 600.0 + u_time * 0.1);
    bg *= mix(0.95, 1.04, grain);
    vec3 color = bg;

    vec3 accent = accentColor(u_symbol);
    color = mix(color, bg * 0.65, carve * revealSweep * 0.55);
    color += frame * vec3(0.06, 0.08, 0.11) * (0.45 + u_accent * 0.8);
    color += accent * line * revealSweep * (0.12 + u_accent * 0.55);
    color += vec3(0.9, 0.93, 1.0) * line * revealSweep * 0.08;

    if (u_symbol == 3) {
      float lockBand = smoothstep(0.05, 0.65, u_locked);
      color = mix(color, color + vec3(0.03, 0.05, 0.09), lockBand * 0.4);
    }

    color += vec3(0.9, 0.35, 0.12) * line * u_thermal * 0.22;
    gl_FragColor = vec4(color, 1.0);
  }
`;

const VignetteShader = {
  uniforms: {
    tDiffuse: { value: null },
    darkness: { value: 0.62 },
    offset: { value: 1.0 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float darkness;
    uniform float offset;
    varying vec2 vUv;
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      float dist = distance(vUv, vec2(0.5));
      float vig = smoothstep(offset, offset - 0.54, dist * (darkness + offset));
      color.rgb *= vig;
      gl_FragColor = color;
    }
  `
};

const FilmGrainShader = {
  uniforms: {
    tDiffuse: { value: null },
    u_seed: { value: 0 },
    u_intensity: { value: 0.035 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float u_seed;
    uniform float u_intensity;
    varying vec2 vUv;
    float rand(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233)) + u_seed) * 43758.5453); }
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      float grain = (rand(vUv * 1300.0) - 0.5) * u_intensity;
      color.rgb += grain;
      gl_FragColor = color;
    }
  `
};

const HeatDistortionShader = {
  uniforms: {
    tDiffuse: { value: null },
    u_intensity: { value: 0 },
    u_time: { value: 0 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float u_intensity;
    uniform float u_time;
    varying vec2 vUv;
    void main() {
      vec2 uv = vUv;
      uv.x += sin(uv.y * 45.0 + u_time * 4.4) * u_intensity * 0.0028;
      uv.y += cos(uv.x * 36.0 + u_time * 3.6) * u_intensity * 0.002;
      gl_FragColor = texture2D(tDiffuse, uv);
    }
  `
};

const FadeShader = {
  uniforms: {
    tDiffuse: { value: null },
    u_opacity: { value: 1 },
  },
  vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float u_opacity;
    varying vec2 vUv;
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      gl_FragColor = vec4(color.rgb * u_opacity, 1.0);
    }
  `
};

function createShellMaterial(bounds) {
  const material = new THREE.ShaderMaterial({
    vertexShader: shellVertexShader,
    fragmentShader: shellFragmentShader,
    uniforms: {
      u_keyLightDir: { value: new THREE.Vector3(0.95, 1.8, 0.9).normalize() },
      u_keyLightColor: { value: new THREE.Vector3(1.0, 0.94, 0.88) },
      u_keyLightIntensity: { value: 1.45 },
      u_fillLightDir: { value: new THREE.Vector3(-1.1, -0.35, 0.9).normalize() },
      u_fillLightColor: { value: new THREE.Vector3(0.68, 0.8, 1.0) },
      u_fillLightIntensity: { value: 0.12 },
      u_rimLightDir: { value: new THREE.Vector3(0.0, 0.3, -1.0).normalize() },
      u_rimLightIntensity: { value: 0.9 },
      u_time: { value: 0 },
      u_thermal: { value: 0 },
      u_coreGlow: { value: 0.15 },
      u_cold: { value: 0 },
      u_bounds: { value: bounds.clone() },
    },
  });
  shellMaterials.push(material);
  return material;
}

function createSymbolMaterial(symbolIndex) {
  const material = new THREE.ShaderMaterial({
    vertexShader: chamberVertexShader,
    fragmentShader: chamberFragmentShader,
    uniforms: {
      u_symbol: { value: symbolIndex },
      u_reveal: { value: 0 },
      u_accent: { value: 0 },
      u_time: { value: 0 },
      u_thermal: { value: 0 },
      u_locked: { value: symbolIndex === 3 ? 1 : 0 },
    },
  });
  symbolMaterials.push(material);
  return material;
}

function buildReliquary() {
  const root = new THREE.Group();

  const bodyGeo = new RoundedBoxGeometry(1.36, 3.75, 1.02, 14, 0.12);

  const plinthGeo = new RoundedBoxGeometry(1.55, 0.58, 1.18, 10, 0.08);

  plinth.position.y = -1.88;

  const collarGeo = new RoundedBoxGeometry(1.48, 0.22, 1.12, 10, 0.05);
  const collar = new THREE.Mesh(collarGeo, createShellMaterial(new THREE.Vector3(0.74, 0.11, 0.56)));

  const crownGeo = new THREE.CylinderGeometry(0.28, 0.45, 0.78, 8, 1, false);

  crown.position.y = 2.25;
  crown.rotation.y = Math.PI * 0.125;
  artifact.add(crown);

  const capGeo = new RoundedBoxGeometry(0.7, 0.18, 0.7, 10, 0.04);
  const cap = new THREE.Mesh(capGeo, createShellMaterial(new THREE.Vector3(0.35, 0.09, 0.35)));
  cap.position.y = 2.62;
  artifact.add(cap);

  for (const y of [-1.18, -0.32, 0.52, 1.38]) {
    const beltGeo = new RoundedBoxGeometry(1.42, 0.055, 1.08, 8, 0.018);
    const belt = new THREE.Mesh(beltGeo, createShellMaterial(new THREE.Vector3(0.71, 0.0275, 0.54)));
    belt.position.y = y;
    artifact.add(belt);
  }

  for (const x of [-0.58, 0.58]) {
    for (const z of [-0.42, 0.42]) {
      const finGeo = new RoundedBoxGeometry(0.1, 2.9, 0.1, 8, 0.03);
      const fin = new THREE.Mesh(finGeo, createShellMaterial(new THREE.Vector3(0.05, 1.45, 0.05)));
      fin.position.set(x, 0.15, z);
      artifact.add(fin);
    }
  }

  for (const x of [-0.44, 0.44]) {
    const spineGeo = new RoundedBoxGeometry(0.06, 3.18, 0.16, 8, 0.02);
    const spine = new THREE.Mesh(spineGeo, createShellMaterial(new THREE.Vector3(0.03, 1.59, 0.08)));
    spine.position.set(x, 0.12, 0.0);
    artifact.add(spine);
  }

  const slitMat = new THREE.ShaderMaterial({
    vertexShader: coreVertexShader,
    fragmentShader: coreFragmentShader,
    uniforms: {
      u_color: { value: new THREE.Vector3(0.26, 0.55, 0.95) },
      u_time: { value: 0 },
      u_intensity: { value: 0.0 },
      u_thermal: { value: 0 },
    },
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  coreMaterial = slitMat;

  const coreGeo = new THREE.CylinderGeometry(0.2, 0.27, 3.05, 10, 1, false);
  const core = new THREE.Mesh(coreGeo, slitMat);
  core.position.y = 0.1;
  core.rotation.y = Math.PI * 0.125;
  artifact.add(core);

  const slitGeo = new THREE.PlaneGeometry(0.08, 2.6);
  const slitPositions = [
    { pos: [0, 0.12, 0.525], rotY: 0 },
    { pos: [0.525, 0.12, 0], rotY: -Math.PI / 2 },
    { pos: [0, 0.12, -0.525], rotY: Math.PI },
    { pos: [-0.525, 0.12, 0], rotY: Math.PI / 2 },
  ];
  for (const slit of slitPositions) {
    const slitMesh = new THREE.Mesh(slitGeo, slitMat);
    slitMesh.position.set(...slit.pos);
    slitMesh.rotation.y = slit.rotY;
    artifact.add(slitMesh);
  }

  const cavityMat = new THREE.MeshBasicMaterial({ color: 0x05070a });
  const barMat = new THREE.MeshBasicMaterial({ color: 0x090c10 });
  const chamberFaces = [
    { name: 'google', symbol: 0, pos: new THREE.Vector3(0, 0.18, 0.56), rotY: 0 },
    { name: 'meta', symbol: 1, pos: new THREE.Vector3(0.56, 0.18, 0), rotY: -Math.PI / 2 },
    { name: 'email', symbol: 2, pos: new THREE.Vector3(0, 0.18, -0.56), rotY: Math.PI },
    { name: 'lock', symbol: 3, pos: new THREE.Vector3(-0.56, 0.18, 0), rotY: Math.PI / 2 },
  ];

  const chambers = [];

  for (const face of chamberFaces) {
    const group = new THREE.Group();
    group.position.copy(face.pos);
    group.rotation.y = face.rotY;

    const cavity = new THREE.Mesh(new RoundedBoxGeometry(0.88, 1.38, 0.2, 10, 0.03), cavityMat);
    cavity.position.z = -0.05;
    group.add(cavity);

    const frameGeo = new RoundedBoxGeometry(1.02, 1.56, 0.08, 10, 0.03);
    const frame = new THREE.Mesh(frameGeo, createShellMaterial(new THREE.Vector3(0.51, 0.78, 0.04)));
    group.add(frame);

    const sillGeo = new RoundedBoxGeometry(0.88, 0.08, 0.08, 8, 0.02);
    const topSill = new THREE.Mesh(sillGeo, createShellMaterial(new THREE.Vector3(0.44, 0.04, 0.04)));
    topSill.position.y = 0.62;
    topSill.position.z = 0.015;
    group.add(topSill);
    const botSill = topSill.clone();
    botSill.position.y = -0.62;
    group.add(botSill);

    const shutterGeo = new RoundedBoxGeometry(0.42, 1.18, 0.055, 10, 0.02);
    const shutterLeft = new THREE.Mesh(shutterGeo, createShellMaterial(new THREE.Vector3(0.21, 0.59, 0.0275)));
    const shutterRight = new THREE.Mesh(shutterGeo, createShellMaterial(new THREE.Vector3(0.21, 0.59, 0.0275)));
    shutterLeft.position.set(-0.21, 0, 0.03);
    shutterRight.position.set(0.21, 0, 0.03);
    group.add(shutterLeft, shutterRight);

    const symbolPlane = new THREE.Mesh(new THREE.PlaneGeometry(0.72, 1.05), createSymbolMaterial(face.symbol));
    symbolPlane.position.z = -0.085;
    group.add(symbolPlane);

    for (const x of [-0.31, 0.31]) {
      for (let i = 0; i < 6; i++) {
        const vent = new THREE.Mesh(
          new RoundedBoxGeometry(0.06, 0.045, 0.03, 4, 0.01),
          createShellMaterial(new THREE.Vector3(0.03, 0.0225, 0.015))
        );
        vent.position.set(x, -0.3 + i * 0.12, 0.018);
        group.add(vent);
      }
    }

    for (const corner of [
      [-0.43, 0.68], [0.43, 0.68], [-0.43, -0.68], [0.43, -0.68]
    ]) {
      const bolt = new THREE.Mesh(
        new THREE.CylinderGeometry(0.022, 0.022, 0.04, 10),
        createShellMaterial(new THREE.Vector3(0.022, 0.02, 0.022))
      );
      bolt.rotation.x = Math.PI / 2;
      bolt.position.set(corner[0], corner[1], 0.036);
      group.add(bolt);
    }

    const iconStack = createIconStack(face.symbol);
    iconStack.group.position.z = -0.01;
    group.add(iconStack.group);

    let heatVeil = null;
    if (face.symbol === 0) {
      const heatUniforms = {
        u_time: { value: 0 },
        u_intensity: { value: 0 },
      };
      const heatMat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        uniforms: heatUniforms,
        vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
        fragmentShader: `
          varying vec2 vUv;
          uniform float u_time;
          uniform float u_intensity;
          float hash(vec2 p){ return fract(sin(dot(p, vec2(41.7,289.1))) * 43758.5453); }
          void main() {
            vec2 p = (vUv - 0.5) * vec2(0.95, 1.7);
            float core = exp(-dot(p, p) * 5.5);
            float band = exp(-pow((p.y + 0.15 - sin(u_time * 10.0 + p.x * 6.0) * 0.08) * 6.0, 2.0));
            float tongues = exp(-pow(abs(p.x) * 2.8 + p.y * 1.8 - 0.2 - sin(u_time * 8.0 + p.y * 14.0) * 0.12, 2.0) * 2.8);
            float shimmer = hash(floor(vUv * 90.0) + floor(u_time * 18.0));
            float intensity = (core * 0.55 + band * 0.65 + tongues * 0.9) * u_intensity;
            vec3 color = mix(vec3(1.0, 0.22, 0.04), vec3(1.0, 0.72, 0.22), clamp(vUv.y * 1.25, 0.0, 1.0));
            color += vec3(1.0, 0.95, 0.8) * max(0.0, shimmer - 0.92) * u_intensity * 0.7;
            gl_FragColor = vec4(color, intensity);
          }
        `,
      });
      const veilA = new THREE.Mesh(new THREE.PlaneGeometry(0.62, 0.96), heatMat);
      veilA.position.set(0, -0.02, -0.07);
      const veilB = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.9), heatMat.clone());
      veilB.material.uniforms = {
        u_time: { value: 0 },
        u_intensity: { value: 0 },
      };
      veilB.position.set(0.02, -0.03, -0.035);
      veilB.rotation.y = 0.18;
      group.add(veilA, veilB);
      heatVeil = [veilA, veilB];
      heatVeils.push(...heatVeil);
    }

    const bars = new THREE.Group();
    if (face.symbol === 3) {
      for (const x of [-0.18, 0, 0.18]) {
        const bar = new THREE.Mesh(new RoundedBoxGeometry(0.09, 1.1, 0.055, 8, 0.018), barMat);
        bar.position.set(x, 0.0, 0.012);
        bars.add(bar);
      }
      group.add(bars);
    }

    artifact.add(group);
    chambers.push({
      name: face.name,
      group,
      shutterLeft,
      shutterRight,
      symbolMaterial: symbolPlane.material,
      iconGroup: iconStack.group,
      iconFrontMat: iconStack.frontMat,
      iconGlowMat: iconStack.glowMat,
      iconShadow: iconStack.shadow,
      bars,
      heatVeil,
      baseLeftX: -0.21,
      baseRightX: 0.21,
    });
  }

  root.userData = { artifact, core, chambers };
  return root;
}

function initScene(scale) {
  currentScale = scale;
  shellMaterials.length = 0;
  symbolMaterials.length = 0;

  const W = Math.round(BASE_W * scale);
  const H = Math.round(BASE_H * scale);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(1);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  const container = document.getElementById('preview-container');
  container.innerHTML = '';
  container.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  camera = new THREE.PerspectiveCamera(35, W / H, 0.001, 100);
  camera.position.set(0, 0.2, 5);

  reliquaryRoot = buildReliquary();
  reliquary = reliquaryRoot.userData.artifact;
  scene.add(reliquaryRoot);

  const glowGeo = new THREE.PlaneGeometry(7.5, 7.5);
  const glowMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: { u_opacity: { value: 0.28 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      uniform float u_opacity;
      void main() {
        vec2 p = (vUv - 0.5) * vec2(1.0, 1.6);
        float d = length(p);
        float a = (1.0 - smoothstep(0.0, 1.0, d)) * u_opacity;
        gl_FragColor = vec4(0.06, 0.07, 0.085, a);
      }
    `,
  });
  glowPlane = new THREE.Mesh(glowGeo, glowMat);
  glowPlane.rotation.x = -Math.PI / 2;
  glowPlane.position.y = -2.55;
  scene.add(glowPlane);

  const shadowGeo = new THREE.PlaneGeometry(4.5, 4.5);
  const shadowMat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: { u_opacity: { value: 0.28 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      uniform float u_opacity;
      void main() {
        vec2 p = (vUv - 0.5) * vec2(1.2, 1.8);
        float d = length(p);
        float a = (1.0 - smoothstep(0.0, 1.0, d)) * u_opacity;
        gl_FragColor = vec4(0.0, 0.0, 0.0, a);
      }
    `,
  });
  shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
  shadowPlane.rotation.x = -Math.PI / 2;
  shadowPlane.position.y = -2.53;
  scene.add(shadowPlane);

  const particleCount = 260;
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 12;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 12;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 12;
  }
  const particleGeo = new THREE.BufferGeometry();
  particleGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0x9aa0aa,
    size: 0.012,
    transparent: true,
    opacity: 0.12,
    sizeAttenuation: true,
  });
  particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);

  composer = new EffectComposer(renderer);
  composer.setSize(W, H);
  composer.addPass(new RenderPass(scene, camera));

  bloomPass = new UnrealBloomPass(new THREE.Vector2(W, H), 0.28, 0.75, 0.86);
  composer.addPass(bloomPass);

  heatPass = new ShaderPass(HeatDistortionShader);
  composer.addPass(heatPass);

  vignettePass = new ShaderPass(VignetteShader);
  composer.addPass(vignettePass);

  grainPass = new ShaderPass(FilmGrainShader);
  composer.addPass(grainPass);

  fadePass = new ShaderPass(FadeShader);
  composer.addPass(fadePass);
}

function getMacroCamera(t) {
  const points = [
    new THREE.Vector3(0.94, 1.25, 1.18),
    new THREE.Vector3(0.93, 0.8, 1.1),
    new THREE.Vector3(0.92, 0.32, 1.05),
    new THREE.Vector3(0.9, -0.2, 0.98),
    new THREE.Vector3(0.88, -0.6, 0.92),
  ];
  const targets = [
    new THREE.Vector3(0.62, 1.05, 0.57),
    new THREE.Vector3(0.61, 0.66, 0.55),
    new THREE.Vector3(0.6, 0.18, 0.53),
    new THREE.Vector3(0.58, -0.24, 0.51),
    new THREE.Vector3(0.56, -0.58, 0.49),
  ];
  const pos = catmullRom(points, smootherstep(0, 1, t));
  const target = catmullRom(targets, smootherstep(0, 1, t));
  pos.x += Math.sin(t * 8.0) * 0.008;
  pos.y += Math.cos(t * 6.4) * 0.006;
  pos.z += Math.sin(t * 5.1) * 0.004;
  return { pos, target, fov: 25 };
}

function getTrialCamera(t) {
  return {
    pos: new THREE.Vector3(
      lerp(1.05, 1.45, smootherstep(0, 1, t)),
      lerp(0.45, 0.55, t),
      lerp(1.55, 2.28, smootherstep(0, 1, t))
    ),
    target: new THREE.Vector3(0.26, 0.18, 0.26),
    fov: 28,
  };
}

function getRevealCamera(t) {
  const tt = smootherstep(0, 1, t);
  return {
    pos: new THREE.Vector3(
      lerp(1.3, 0.22, tt),
      lerp(0.55, 0.22, tt),
      lerp(2.5, 4.85, tt)
    ),
    target: new THREE.Vector3(0.0, 0.15, 0.0),
    fov: lerp(31, 35, tt),
  };
}

function getHeroCamera(t) {
  return {
    pos: new THREE.Vector3(Math.sin(t * 0.35) * 0.18, 0.22 + Math.sin(t * 0.2) * 0.03, 4.45),
    target: new THREE.Vector3(0.0, 0.15, 0.0),
    fov: 35,
  };
}

function getWeighCamera(t) {
  const tt = smootherstep(0, 1, t);
  return {
    pos: new THREE.Vector3(Math.sin(tt * Math.PI * 1.3) * 0.22, 0.2, lerp(4.65, 4.45, tt)),
    target: new THREE.Vector3(0.0, 0.12, 0.0),
    fov: 35,
  };
}

function getLockCamera(t) {
  const tt = smootherstep(0, 1, t);
  return {
    pos: new THREE.Vector3(lerp(0.12, 0.02, tt), lerp(0.18, 0.14, tt), lerp(4.0, 3.15, tt)),
    target: new THREE.Vector3(0.0, 0.08, 0.0),
    fov: lerp(35, 33, tt),
  };
}

function getHandoffCamera(t) {
  const tt = smootherstep(0, 1, t);
  return {
    pos: new THREE.Vector3(0.0, lerp(0.22, 0.4, tt), lerp(4.6, 7.2, tt)),
    target: new THREE.Vector3(0.0, 0.08, 0.0),
    fov: lerp(35, 37, tt),
  };
}

function getCameraForTime(t) {
  if (t < ACT.SEAM.end) return getMacroCamera(mapRange(t, ACT.SEAM.start, ACT.SEAM.end, 0, 1));
  if (t < ACT.TRIAL.end) return getTrialCamera(mapRange(t, ACT.TRIAL.start, ACT.TRIAL.end, 0, 1));
  if (t < ACT.REVEAL.end) return getRevealCamera(mapRange(t, ACT.REVEAL.start, ACT.REVEAL.end, 0, 1));
  if (t < ACT.CHANNELS.end) return getHeroCamera(t);
  if (t < ACT.WEIGH.end) return getWeighCamera(mapRange(t, ACT.WEIGH.start, ACT.WEIGH.end, 0, 1));
  if (t < ACT.LOCK.end) return getLockCamera(mapRange(t, ACT.LOCK.start, ACT.LOCK.end, 0, 1));
  return getHandoffCamera(mapRange(t, ACT.HANDOFF.start, ACT.BLACK.end, 0, 1));
}

function getYawForTime(t) {
  if (t < ACT.REVEAL.start) return 0.18 + Math.sin(t * 0.35) * 0.02;
  if (t < ACT.CHANNELS.start) return lerp(0.18, 0.0, smootherstep(ACT.REVEAL.start, ACT.CHANNELS.start, t));
  if (t < 24) return 0.0;
  if (t < 26) return lerp(0.0, -Math.PI / 2, smootherstep(24, 26, t));
  if (t < 28) return lerp(-Math.PI / 2, -Math.PI, smootherstep(26, 28, t));
  if (t < ACT.WEIGH.end) return lerp(-Math.PI, -Math.PI * 1.32, smootherstep(ACT.WEIGH.start, ACT.WEIGH.end, t));
  if (t < 40) return lerp(-Math.PI * 1.32, -Math.PI * 1.5, smootherstep(ACT.LOCK.start, 40, t));
  if (t < ACT.LOCK.end) return -Math.PI * 1.5;
  if (t < ACT.BLACK.start) return lerp(-Math.PI * 1.5, -Math.PI * 1.72, smootherstep(ACT.HANDOFF.start, ACT.BLACK.start, t));
  return -Math.PI * 1.72 + (t - ACT.BLACK.start) * 0.04;
}

function chamberRevealWindow(t, start, end) {
  return smoothstep(start, start + 0.8, t) * (1.0 - smoothstep(end, end + 0.35, t)) + smoothstep(start + 0.8, end, t);
}

function updateChambers(t, thermal, cold) {
  const chambers = reliquaryRoot.userData.chambers;
  const googleReveal = chamberRevealWindow(t, 22.15, 24.0);
  const metaReveal = chamberRevealWindow(t, 24.15, 26.0);
  const emailReveal = chamberRevealWindow(t, 26.15, 28.0);
  const lockReveal = smoothstep(37.2, 39.4, t) * 0.75;
  const idleAccent = smoothstep(ACT.WEIGH.start, ACT.WEIGH.end, t) * 0.25;

  const revealMap = {
    google: googleReveal,
    meta: metaReveal,
    email: emailReveal,
    lock: lockReveal,
  };

  for (const chamber of chambers) {
    const reveal = revealMap[chamber.name] || 0;
    const openAmount = chamber.name === 'lock' ? reveal * 0.28 : reveal * 0.95;
    chamber.shutterLeft.position.x = chamber.baseLeftX - openAmount * 0.28;
    chamber.shutterRight.position.x = chamber.baseRightX + openAmount * 0.28;
    chamber.shutterLeft.position.z = 0.03 + openAmount * 0.012;
    chamber.shutterRight.position.z = 0.03 + openAmount * 0.012;
    chamber.shutterLeft.rotation.z = openAmount * 0.08;
    chamber.shutterRight.rotation.z = -openAmount * 0.08;

    const pop = chamber.name === 'lock'
      ? smoothstep(37.8, 39.6, t)
      : easeOutBack(smoothstep(22.35 + (chamber.name === 'meta' ? 2.0 : chamber.name === 'email' ? 4.0 : 0.0), 23.25 + (chamber.name === 'meta' ? 2.0 : chamber.name === 'email' ? 4.0 : 0.0), t));

    chamber.iconGroup.position.z = chamber.name === 'lock'
      ? -0.018 + pop * 0.055
      : -0.03 + pop * 0.17;
    chamber.iconGroup.position.y = chamber.name === 'lock'
      ? -0.03 + pop * 0.01
      : -0.02 + pop * 0.035;
    chamber.iconGroup.rotation.x = chamber.name === 'lock'
      ? 0.0
      : lerp(-0.72, 0.0, clamp(pop, 0, 1));
    chamber.iconGroup.rotation.z = chamber.name === 'lock'
      ? 0.0
      : Math.sin((t - 22.0) * 9.0) * 0.025 * reveal;
    chamber.iconGroup.scale.setScalar(chamber.name === 'lock' ? 0.72 + pop * 0.12 : 0.7 + pop * 0.42);
    chamber.iconFrontMat.opacity = chamber.name === 'lock' ? 0.82 * reveal : clamp(pop * 1.08, 0, 1);
    chamber.iconGlowMat.opacity = chamber.name === 'lock'
      ? 0.18 + pop * 0.16
      : 0.18 + reveal * 0.5 + Math.sin(t * 7.0 + reveal * 4.0) * 0.05;
    chamber.iconShadow.material.opacity = chamber.name === 'lock' ? 0.24 : 0.2 + reveal * 0.14;

    chamber.symbolMaterial.uniforms.u_reveal.value = chamber.name === 'lock' ? reveal * 0.82 : reveal;
    chamber.symbolMaterial.uniforms.u_accent.value = chamber.name === 'lock' ? 0.18 + cold * 0.35 : Math.max(reveal * 0.65, idleAccent);
    chamber.symbolMaterial.uniforms.u_time.value = t;
    chamber.symbolMaterial.uniforms.u_thermal.value = thermal;
    chamber.symbolMaterial.uniforms.u_locked.value = chamber.name === 'lock' ? 1.0 : 0.0;

    if (chamber.name === 'lock' && chamber.bars.children.length) {
      const travel = reveal * 0.22;
      chamber.bars.position.y = travel;
      chamber.bars.rotation.z = -reveal * 0.02;
    }

    if (chamber.heatVeil) {
      const heatBoost = thermal * (0.65 + 0.35 * Math.sin(t * 16.0));
      for (const veil of chamber.heatVeil) {
        veil.material.uniforms.u_time.value = t;
        veil.material.uniforms.u_intensity.value = heatBoost;
      }
    }
  }
}

function updateLighting(t, thermal, cold, activation) {
  const inMacro = t < ACT.REVEAL.start;
  for (const mat of shellMaterials) {
    mat.uniforms.u_time.value = t;
    mat.uniforms.u_thermal.value = thermal;
    mat.uniforms.u_coreGlow.value = activation;
    mat.uniforms.u_cold.value = cold;

    if (inMacro) {
      mat.uniforms.u_keyLightIntensity.value = 1.6 + thermal * 0.08;
      mat.uniforms.u_fillLightIntensity.value = 0.08 + thermal * 0.1;
      mat.uniforms.u_rimLightIntensity.value = 1.08 + thermal * 0.12;
    } else if (t < ACT.CHANNELS.start) {
      const revealT = mapRange(t, ACT.REVEAL.start, ACT.CHANNELS.start, 0, 1);
      mat.uniforms.u_keyLightIntensity.value = lerp(1.5, 1.22, revealT);
      mat.uniforms.u_fillLightIntensity.value = lerp(0.08, 0.45, revealT);
      mat.uniforms.u_rimLightIntensity.value = lerp(1.0, 0.82, revealT);
    } else if (t < ACT.LOCK.start) {
      mat.uniforms.u_keyLightIntensity.value = 1.22;
      mat.uniforms.u_fillLightIntensity.value = 0.46;
      mat.uniforms.u_rimLightIntensity.value = 0.82;
    } else if (t < ACT.HANDOFF.start) {
      mat.uniforms.u_keyLightIntensity.value = 0.98;
      mat.uniforms.u_fillLightIntensity.value = 0.54;
      mat.uniforms.u_rimLightIntensity.value = 0.68;
    } else {
      const dim = 1.0 - smoothstep(ACT.HANDOFF.start, ACT.BLACK.end, t);
      mat.uniforms.u_keyLightIntensity.value = 1.0 * dim;
      mat.uniforms.u_fillLightIntensity.value = 0.55 * dim;
      mat.uniforms.u_rimLightIntensity.value = 0.72 * Math.max(dim, 0.18);
    }
  }

  coreMaterial.uniforms.u_time.value = t;
  coreMaterial.uniforms.u_intensity.value = activation * 0.9;
  coreMaterial.uniforms.u_thermal.value = thermal;
  coreMaterial.uniforms.u_color.value.set(
    lerp(0.24, 0.34, cold),
    lerp(0.55, 0.58, cold),
    lerp(0.96, 1.0, cold)
  );
}

function updateScene(t) {
  const cam = getCameraForTime(t);
  camera.position.copy(cam.pos);
  camera.lookAt(cam.target);
  camera.fov = cam.fov;
  camera.updateProjectionMatrix();

  const thermalRise = smoothstep(9.9, 14.4, t);
  const thermalFall = 1.0 - smoothstep(14.9, 16.0, t);
  const thermalPulse = 0.82 + 0.18 * Math.sin(t * 14.0) + Math.max(0.0, Math.sin(t * 32.0)) * 0.12;
  const thermal = clamp(thermalRise * thermalFall * thermalPulse, 0, 1);
  const cold = smoothstep(ACT.LOCK.start, ACT.LOCK.end - 0.6, t);
  const activation = 0.16 + smoothstep(ACT.REVEAL.start, ACT.CHANNELS.start, t) * 0.35 + smoothstep(ACT.WEIGH.start, ACT.WEIGH.end, t) * 0.12;

  const yaw = getYawForTime(t);
  reliquary.rotation.set(0.035 + Math.sin(t * 0.18) * 0.01, yaw, Math.sin(t * 0.37) * 0.02);
  reliquary.position.y = Math.sin(t * 0.7) * 0.04;

  reliquaryRoot.userData.core.rotation.y = t * 0.34 + smoothstep(ACT.WEIGH.start, ACT.LOCK.end, t) * 0.25;
  reliquaryRoot.userData.core.rotation.z = Math.sin(t * 0.55) * 0.06;

  updateChambers(t, thermal, cold);
  updateLighting(t, thermal, cold, activation);

  glowPlane.material.uniforms.u_opacity.value = (lerp(0.2, 0.32, activation) + thermal * 0.1) * (1.0 - smoothstep(ACT.BLACK.start, ACT.BLACK.end, t));
  shadowPlane.material.uniforms.u_opacity.value = lerp(0.2, 0.33, 1.0 - thermal * 0.2) * (1.0 - smoothstep(ACT.BLACK.start, ACT.BLACK.end, t));

  bloomPass.strength = 0.24 + thermal * 0.78 + smoothstep(22.0, 28.0, t) * 0.12;
  heatPass.uniforms.u_intensity.value = thermal * (0.45 + 0.55 * smoothstep(11.0, 14.8, t));
  heatPass.uniforms.u_time.value = t;
  vignettePass.uniforms.darkness.value = t < ACT.LOCK.start ? 0.62 : lerp(0.62, 0.9, smoothstep(ACT.LOCK.start, ACT.BLACK.start, t));
  grainPass.uniforms.u_seed.value = t * 130.0;
  grainPass.uniforms.u_intensity.value = 0.035 + thermal * 0.01;
  fadePass.uniforms.u_opacity.value = t < ACT.BLACK.start ? 1.0 : 1.0 - smoothstep(ACT.BLACK.start, ACT.BLACK.end, t);

  particles.rotation.y = t * 0.02;
  particles.rotation.x = Math.sin(t * 0.08) * 0.05;
  particles.material.opacity = t < ACT.HANDOFF.start ? 0.1 : lerp(0.1, 0.2, smoothstep(ACT.HANDOFF.start, ACT.BLACK.start, t));
  particles.material.color.setRGB(
    lerp(0.6, 1.0, thermal),
    lerp(0.63, 0.56, thermal),
    lerp(0.68, 0.32, thermal)
  );
  const positions = particles.geometry.attributes.position.array;
  for (let i = 0; i < positions.length / 3; i++) {
    positions[i * 3 + 1] += 0.0007 + thermal * 0.0025;
    positions[i * 3] += Math.sin(t * 4.0 + i * 0.31) * thermal * 0.0009;
    if (positions[i * 3 + 1] > 6) positions[i * 3 + 1] = -6;
  }
  particles.geometry.attributes.position.needsUpdate = true;
}

window.startPreview = function() {
  if (isRendering) return;
  if (previewRAF) cancelAnimationFrame(previewRAF);

  const scale = parseFloat(document.getElementById('res-select').value);
  initScene(Math.min(scale, 0.5));

  const statusEl = document.getElementById('status');
  const startTime = performance.now();

  function tick() {
    const elapsed = (performance.now() - startTime) / 1000;
    const t = elapsed % DURATION;
    updateScene(t);
    composer.render();

    let actName = 'SEAM';
    if (t >= ACT.TRIAL.start) actName = 'TRIAL';
    if (t >= ACT.REVEAL.start) actName = 'REVEAL';
    if (t >= ACT.CHANNELS.start) actName = 'CHANNELS';
    if (t >= ACT.WEIGH.start) actName = 'WEIGH-IN';
    if (t >= ACT.LOCK.start) actName = 'LOCK';
    if (t >= ACT.HANDOFF.start) actName = 'HANDOFF';
    if (t >= ACT.BLACK.start) actName = 'BLACK';
    statusEl.textContent = `Preview — ${t.toFixed(1)}s / ${DURATION}s — ACT ${actName}`;

    previewRAF = requestAnimationFrame(tick);
  }

  tick();
};

window.startRender = async function() {
  if (isRendering) return;
  isRendering = true;
  if (previewRAF) {
    cancelAnimationFrame(previewRAF);
    previewRAF = null;
  }

  const scale = parseFloat(document.getElementById('res-select').value);
  const fps = parseInt(document.getElementById('fps-select').value, 10);
  const totalFrames = Math.round(DURATION * fps);

  document.getElementById('btn-render').disabled = true;
  document.getElementById('btn-preview').disabled = true;
  document.getElementById('progress-wrap').style.display = 'block';
  const statusEl = document.getElementById('status');
  const progressBar = document.getElementById('progress-bar');

  initScene(scale);

  let dirHandle = null;
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    statusEl.textContent = `Rendering ${totalFrames} frames to folder...`;
  } catch (e) {
    statusEl.textContent = 'Directory picker cancelled. Falling back to browser downloads...';
  }

  const frameBlobs = dirHandle ? null : [];

  for (let frame = 0; frame < totalFrames; frame++) {
    const t = frame / fps;
    updateScene(t);
    composer.render();

    const blob = await new Promise(resolve => {
      renderer.domElement.toBlob(resolve, 'image/png');
    });

    const frameName = `frame_${String(frame).padStart(5, '0')}.png`;

    if (dirHandle) {
      const fileHandle = await dirHandle.getFileHandle(frameName, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
    } else {
      frameBlobs.push({ name: frameName, blob });
    }

    const pct = ((frame + 1) / totalFrames) * 100;
    progressBar.style.width = `${pct}%`;
    statusEl.textContent = `Frame ${frame + 1}/${totalFrames} (${pct.toFixed(1)}%) — ${t.toFixed(2)}s`;
    await new Promise(resolve => setTimeout(resolve, 0));
  }

  if (!dirHandle && frameBlobs.length > 0) {
    statusEl.textContent = `Downloading ${frameBlobs.length} frames...`;
    for (let i = 0; i < frameBlobs.length; i++) {
      const url = URL.createObjectURL(frameBlobs[i].blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = frameBlobs[i].name;
      a.click();
      URL.revokeObjectURL(url);
      if (i % 50 === 0) await new Promise(resolve => setTimeout(resolve, 100));
    }
  }

  const ffmpegCmd = document.getElementById('ffmpeg-cmd');
  ffmpegCmd.style.display = 'block';
  ffmpegCmd.textContent = `ffmpeg -framerate ${fps} -i frame_%05d.png -c:v libx264 -preset slow -crf 18 -pix_fmt yuv420p reliquary-video.mp4`;

  statusEl.textContent = `Done! ${totalFrames} frames rendered. Use ffmpeg command below to compile.`;
  document.getElementById('btn-render').disabled = false;
  document.getElementById('btn-preview').disabled = false;
  isRendering = false;
};

window.addEventListener('load', () => {
  document.getElementById('res-select').value = '0.25';
  window.startPreview();
});
</script>
</body>
